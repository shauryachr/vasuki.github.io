<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 Regex Tester | Vasuki Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#1a73e8;
--bg:#202124;
--card:#18181b;
--text:#e8eaed;
--muted:#9aa0a6;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Roboto',system-ui;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD */
.shell{
width:100%;
max-width:600px;
background:var(--card);
border:1px solid #3c4043;
border-radius:16px;
padding:20px;
}

h1{font-size:1.3rem;}
p{color:var(--muted);font-size:0.9rem;margin-bottom:1rem;}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

input, textarea{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #3c4043;
background:#202124;
color:white;
}

textarea{min-height:120px;resize:vertical;}

button{
background:var(--primary);
border:none;
color:white;
padding:8px 14px;
border-radius:999px;
cursor:pointer;
}

button:hover{background:#1765cc;}

.result{
margin-top:10px;
font-size:0.85rem;
color:var(--muted);
word-break:break-word;
}

mark{
background:#fbbc04;
color:black;
padding:2px;
border-radius:3px;
}

/* DEVICE MODAL */
.device-modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.device-box{
background:#18181b;
border:1px solid #3c4043;
padding:20px;
border-radius:16px;
text-align:center;
}

.device-options{
display:flex;
gap:10px;
margin-top:15px;
}

.device-btn{
flex:1;
padding:10px;
background:#202124;
border-radius:10px;
cursor:pointer;
}

.device-btn:hover{background:#2a2b2e;}

/* PHONE MODE */
.phone-mode .shell{
max-width:340px;
font-size:14px;
}
</style>
</head>

<body>

<!-- DEVICE MODAL -->
<div id="deviceModal" class="device-modal">
  <div class="device-box">
    <h2>Select Mode</h2>
    <p style="color:#9aa0a6">Optimize UI for your device</p>

    <div class="device-options">
      <div class="device-btn" onclick="setMode('phone')">📱 Phone</div>
      <div class="device-btn" onclick="setMode('desktop')">💻 Desktop</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="shell">

<h1>🔍 Regex Tester</h1>
<p>Test JavaScript regular expressions instantly.</p>

<div class="row">
<input id="pattern" placeholder="Pattern (e.g. \\d+)" />
<input id="flags" placeholder="Flags (g,i,m)" style="max-width:100px;">
<button onclick="runRegex()">Run</button>
</div>

<textarea id="text" placeholder="Enter text..."></textarea>

<div id="regex-result" class="result"></div>

</main>

<script>

/* DEVICE MODE */
function setMode(mode){
localStorage.setItem("deviceMode",mode);
applyMode();
document.getElementById("deviceModal").style.display="none";
}

function applyMode(){
if(localStorage.getItem("deviceMode")==="phone"){
document.body.classList.add("phone-mode");
}else{
document.body.classList.remove("phone-mode");
}
}

window.onload=function(){
applyMode();
if(!localStorage.getItem("deviceMode")){
document.getElementById("deviceModal").style.display="flex";
}else{
document.getElementById("deviceModal").style.display="none";
}
};

/* REGEX TEST */
function runRegex(){
const pattern=document.getElementById('pattern').value;
const flags=document.getElementById('flags').value;
const text=document.getElementById('text').value;
const out=document.getElementById('regex-result');

if(!pattern){
out.textContent='';
return;
}

try{
const re=new RegExp(pattern,flags);
let matches=[...text.matchAll(re)];

if(matches.length===0){
out.textContent='No matches.';
return;
}

/* Highlight */
let highlighted=text.replace(re, m=>`<mark>${m}</mark>`);

out.innerHTML = `
Matches: ${matches.length}<br><br>
${highlighted}
`;

}catch(e){
out.textContent='Error: '+e.message;
}
}

</script>

</body>
</html>
