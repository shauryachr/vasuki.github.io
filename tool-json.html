<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JSON Formatter</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--primary:#1a73e8;
--border:#dadce0;
--bg:#f1f3f4;
--text:#202124;
--card:#ffffff;
--danger:#ea4335;
--success:#34a853;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Roboto,system-ui;
background:var(--bg);
color:var(--text);
padding:40px;
}

.card{
max-width:800px;
margin:auto;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:25px;
}

h2{
color:var(--primary);
margin-bottom:15px;
}

textarea{
width:100%;
height:220px;
padding:12px;
border:1px solid var(--border);
border-radius:8px;
font-family:monospace;
resize:vertical;
outline:none;
}

textarea:focus{
border-color:var(--primary);
box-shadow:0 0 0 2px rgba(26,115,232,0.2);
}

.row{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

.primary{background:var(--primary);color:white;}
.secondary{background:#e8eaed;}

.result{
margin-top:15px;
padding:10px;
border:1px solid var(--border);
border-radius:6px;
background:#fafafa;
font-size:14px;
}

.error{color:var(--danger);}
.success{color:var(--success);}

</style>

</head>

<body>

<div class="card">

<h2>JSON Formatter</h2>

<textarea id="jsonInput" placeholder='Paste JSON here...'></textarea>

<div class="row">
<button class="primary" onclick="formatJson()">Format</button>
<button class="secondary" onclick="minifyJson()">Minify</button>
<button class="secondary" onclick="copyJson()">Copy</button>
<button class="secondary" onclick="downloadJson()">Download</button>
<button class="secondary" onclick="clearJson()">Clear</button>
</div>

<div id="result" class="result"></div>

</div>

<script>

const input=document.getElementById("jsonInput");
const result=document.getElementById("result");

/* PARSER */
function tryParse(){
try{
return {data:JSON.parse(input.value),error:null}
}catch(e){
return {data:null,error:e.message}
}
}

/* FORMAT */
function formatJson(){
let res=tryParse();

if(res.error){
result.innerHTML='<span class="error">Error: '+res.error+'</span>';
return;
}

input.value=JSON.stringify(res.data,null,2);
result.innerHTML='<span class="success">Formatted</span>';
}

/* MINIFY */
function minifyJson(){
let res=tryParse();

if(res.error){
result.innerHTML='<span class="error">Error: '+res.error+'</span>';
return;
}

input.value=JSON.stringify(res.data);
result.innerHTML='<span class="success">Minified</span>';
}

/* COPY */
function copyJson(){
navigator.clipboard.writeText(input.value);
result.innerHTML='<span class="success">Copied to clipboard</span>';
}

/* DOWNLOAD */
function downloadJson(){
let blob=new Blob([input.value],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.json";
a.click();
}

/* CLEAR */
function clearJson(){
input.value="";
result.textContent="";
}

/* LIVE VALIDATION */
input.addEventListener("input",()=>{
let res=tryParse();
if(res.error){
result.innerHTML='<span class="error">Invalid JSON</span>';
}else{
result.innerHTML='<span class="success">Valid JSON</span>';
}
});

/* KEYBOARD SHORTCUTS */
document.addEventListener("keydown",e=>{
if(e.ctrlKey && e.key==="Enter"){
formatJson();
}
});

</script>

</body>
</html>
