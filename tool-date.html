<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 Date Tool | Vasuki Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#1a73e8;
--bg:#202124;
--card:#18181b;
--text:#e8eaed;
--muted:#9aa0a6;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Roboto',system-ui;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD */
.shell{
width:100%;
max-width:420px;
background:var(--card);
border:1px solid #3c4043;
border-radius:16px;
padding:20px;
}

h1{font-size:1.3rem;}
p{color:var(--muted);font-size:0.9rem;margin-bottom:1rem;}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #3c4043;
background:#202124;
color:white;
margin-bottom:10px;
}

.result{
margin-top:10px;
font-size:0.95rem;
color:#9aa0a6;
}

.clock{
font-size:1.2rem;
margin-bottom:10px;
color:#34a853;
}

/* DEVICE MODAL */
.device-modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.device-box{
background:#18181b;
border:1px solid #3c4043;
padding:20px;
border-radius:16px;
text-align:center;
}

.device-options{
display:flex;
gap:10px;
margin-top:15px;
}

.device-btn{
flex:1;
padding:10px;
background:#202124;
border-radius:10px;
cursor:pointer;
}

.device-btn:hover{background:#2a2b2e;}

.phone-mode .shell{
max-width:320px;
font-size:14px;
}
</style>
</head>

<body>

<!-- DEVICE MODAL -->
<div id="deviceModal" class="device-modal">
  <div class="device-box">
    <h2>Select Mode</h2>
    <p style="color:#9aa0a6">Optimize UI for your device</p>

    <div class="device-options">
      <div class="device-btn" onclick="setMode('phone')">📱 Phone</div>
      <div class="device-btn" onclick="setMode('desktop')">💻 Desktop</div>
    </div>
  </div>
</div>

<main class="shell">

<h1>📅 Date Tool</h1>
<p>Check date info and live time</p>

<div id="clock" class="clock"></div>

<input id="date-input" type="date" onchange="describe()">

<div id="date-info" class="result"></div>

</main>

<script>

/* LIVE CLOCK */
setInterval(()=>{
document.getElementById("clock").textContent=new Date().toLocaleString();
},1000);

/* DATE INFO */
const WEEKDAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function describe(){
const v=document.getElementById('date-input').value;
const out=document.getElementById('date-info');

if(!v){out.textContent='';return;}

const d=new Date(v+'T00:00:00');

if(isNaN(d.getTime())){
out.textContent='Invalid date';
return;
}

const now=new Date();
const diffDays=Math.round((d-now)/86400000);
const wd=WEEKDAYS[d.getDay()];

out.textContent=`${wd}, ${d.toDateString()} · ${diffDays} day(s) from today`;
}

/* INIT TODAY */
(function(){
const el=document.getElementById('date-input');
const today=new Date();
el.value=today.toISOString().slice(0,10);
describe();
})();

/* DEVICE MODE */
function setMode(mode){
localStorage.setItem("deviceMode",mode);
applyMode();
document.getElementById("deviceModal").style.display="none";
}

function applyMode(){
if(localStorage.getItem("deviceMode")==="phone"){
document.body.classList.add("phone-mode");
}else{
document.body.classList.remove("phone-mode");
}
}

window.onload=function(){
applyMode();
if(!localStorage.getItem("deviceMode")){
document.getElementById("deviceModal").style.display="flex";
}else{
document.getElementById("deviceModal").style.display="none";
}
};

</script>

</body>
</html>
