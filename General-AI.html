<head>

<title>Vasuki Coder - AI Code Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

<style>

:root{
--primary:#7c3aed;
--primary-hover:#5b21b6;
--accent:#06b6d4;
--text:#e5e7eb;
--text-secondary:#9ca3af;
--background:#0b0f1a;
--surface:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
--glass:rgba(255,255,255,0.04);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Roboto,system-ui;
background:radial-gradient(circle at top,#111827,#020617 70%);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

header{
width:100%;
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
position:absolute;
top:0;
z-index:10;
background:rgba(10,10,20,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
}

.logo{
color:var(--accent);
font-weight:700;
font-size:24px;
text-decoration:none;
}

.logo:hover{opacity:0.8}

.nav-links a{
color:var(--text-secondary);
padding:8px 14px;
border-radius:10px;
transition:0.3s;
}

.nav-links a:hover{
color:white;
background:var(--glass);
}

/* DROPDOWN */

.dropdown-content{
background:rgba(10,10,20,0.9);
backdrop-filter:blur(10px);
border:1px solid var(--border);
}

.dropdown-content a:hover{
background:var(--glass);
color:var(--accent);
}

/* MAIN */

.container{
margin-top:15vh;
height:55vh;
max-width:800px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

.greeting{
font-size:38px;
font-weight:500;
margin-top:10vh;
background:linear-gradient(90deg,#8b5cf6,#06b6d4);
-webkit-background-clip:text;
color:transparent;
}

.greeting span{
font-size:16px;
color:var(--text-secondary);
}

/* INPUT */

.input-wrapper{
width:90%;
max-width:720px;
background:var(--glass);
border:1px solid var(--border);
border-radius:20px;
padding:14px 20px;
margin-top:24px;
backdrop-filter:blur(12px);
transition:0.3s;
}

.input-wrapper:hover{
border-color:var(--primary);
box-shadow:0 0 20px rgba(124,58,237,0.2);
}

input#query{
color:white;
}

input#query::placeholder{
color:var(--text-secondary);
}

/* STOP BTN */

.loader-ring{
border-top:2px solid var(--accent);
}

/* TOOL BUTTON */

.tool-btn{
background:rgba(124,58,237,0.15);
color:#c4b5fd;
border:1px solid rgba(124,58,237,0.2);
}

.tool-btn:hover{
background:rgba(124,58,237,0.3);
}

/* MODE */

#modeLabel{
background:rgba(6,182,212,0.15);
color:#67e8f9;
}

#modeLabel:hover{
background:rgba(6,182,212,0.3);
}

.mode-dropdown{
background:rgba(10,10,20,0.9);
backdrop-filter:blur(10px);
}

.mode-option:hover{
background:var(--glass);
color:var(--accent);
}

/* CHIPS */

.chip{
background:var(--glass);
border:1px solid var(--border);
color:var(--text);
}

.chip:hover{
border-color:var(--primary);
box-shadow:0 0 12px rgba(124,58,237,0.3);
}

.chip svg{
stroke:var(--accent);
}

/* CHAT */

.user-msg{
background:rgba(124,58,237,0.15);
border:1px solid rgba(124,58,237,0.2);
}

.bot-msg{
color:var(--text);
}

/* CODE */

pre{
background:#020617 !important;
border:1px solid var(--border) !important;
}

.code-copy-btn{
background:var(--glass);
color:white;
border:1px solid var(--border);
}

/* ACTIONS */

.action-btn:hover{
background:var(--glass);
color:var(--accent);
}

/* FOOTER */

.docked-footer{
bottom:20px;
}

</style>

</head>

<body>

<header>

<div class="nav-left">

<a class="logo" href="index.html">VASUKI LABS</a>

<div class="nav-links">

<a href="Wiki-Knowledge.html">Wiki</a>

<div class="dropdown">

<a>Tools ▾</a>

<div class="dropdown-content">

<a href="tool-ascii.html">ASCII</a>

<a href="tool-color.html">Color</a>
<a href="tool-date.html">Date</a>
<a href="tool-json.html">JSON</a>
<a href="tool-numbers.html">Numbers</a>
<a href="tool-password.html">Password</a>
<a href="tool-regex.html">Regex</a>
<a href="tool-roman.html">Roman</a>
<a href="tool-units.html">Units</a>

</div>

</div>

<a href="review.html">Review</a>
<a href="about.html">About</a>

</div>

</div>

<div class="header-right">

</div>

</header>

<div class="container" id="homeUI">

<div class="greeting">
<span id="userName">✦ Hi Developer</span>
Welcome to Vasuki Labs
</div>

<div class="input-wrapper" id="mainInput">

<div class="input-top">
<input type="text" id="query" placeholder="Ask for code help..." autocomplete="off">
<div class="stop-btn-container" id="stopContainer">
<div class="loader-ring"></div>
<button id="stopBtn" onclick="stopAIResponse()" title="Stop response"></button>
</div>
</div>

<div class="input-bottom">
<div class="tools-group">
<div class="tool-btn">Vasuki Labs</div>
</div>
<div class="mode-select-container">
<div id="modeLabel" onclick="toggleModeDropdown()">Code ▾</div>
<div class="mode-dropdown" id="modeDropdown">
<div class="mode-option" onclick="setMode('ask')">Ask</div>
<div class="mode-option" onclick="setMode('debug')">Debug</div>
<div class="mode-option" onclick="setMode('optimize')">Optimize</div>
</div>
</div>
</div>

</div>

<div class="chips-container">

<div class="chip" onclick="handleQuickAction('Write a React component with TypeScript')">
<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
React Component
</div>

<div class="chip" onclick="handleQuickAction('Debug this JavaScript function: function sum(a,b){return a+b;}')">
<svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
Debug Function
</div>

<div class="chip" onclick="handleQuickAction('Optimize this algorithm for better performance')">
<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
Optimize Code
</div>

<div class="chip" onclick="handleQuickAction('Generate Python code for data analysis')">
<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
Python Script
</div>

</div>

</div>

<div id="chatArea"></div>
<div id="footerDock" class="hidden docked-footer"></div>

<script type="module" src="script.js"></script>

</body>
</html>
