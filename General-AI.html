<!DOCTYPE html>
<html lang="en" data-theme="rose-gold">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASUKI.CLOUD - Professional AI</title>
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>

<style>
:root {
    --bg-main: radial-gradient(circle at top right,#f8faff 0%,#ffffff 100%);
    --text-main: #1f1f1f;
    --text-secondary: #5f6368;
    --glass-bg: rgba(255,255,255,0.6);
    --glass-border: rgba(255,255,255,0.5);
    --vasuki-accent: #1a73e8;
    --accent-hover: #0c5ec4;
    --gradient-start: #1a73e8;
    --gradient-mid: #6aa7f1;
    --gradient-end: #b6d6fb;
    --nav-bg: rgba(255,255,255,0.8);
    --card-bg: var(--glass-bg);
    --msg-user-bg: #f1f3f4;
    --msg-ai-bg: #ffffff;
    --msg-ai-border: #e8eaed;
}

[data-theme="rose-gold"] {
    --bg-main: radial-gradient(1200px 800px at 15% 10%, #2a1f22 0%, #1b1417 40%, #0f0c0d 100%);
    --text-main: #efe6e8;
    --text-secondary: #cdb6bc;
    --glass-bg: rgba(25, 20, 22, 0.7);
    --glass-border: rgba(183, 110, 121, 0.2);
    --vasuki-accent: #b76e79;
    --accent-hover: #9f5d67;
    --gradient-start: #b76e79;
    --gradient-mid: #e9c7c1;
    --gradient-end: #f7e9e6;
    --nav-bg: rgba(15, 12, 13, 0.8);
    --card-bg: var(--glass-bg);
    --msg-user-bg: #2a2224;
    --msg-ai-bg: #1d1719;
    --msg-ai-border: rgba(183, 110, 121, 0.15);
}

body{
    font-family: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    min-height:100vh;
    margin:0;
    display:flex;
    flex-direction:column;
}

.navbar{
    background:var(--nav-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,0,0,0.05);
    height:64px;
    display:flex;
    align-items:center;
    padding:0 24px;
    position:sticky;
    top:0;
    z-index:50;
}

.glass-card{
    background:var(--card-bg);
    backdrop-filter:blur(24px);
    border:1px solid var(--glass-border);
    border-radius:24px;
    box-shadow:0 8px 32px rgba(0,0,0,0.04);
}

.logo-text{
    background:linear-gradient(90deg,var(--gradient-start),var(--gradient-mid),var(--gradient-end));
    background-clip:text;
    color:transparent;
}

.search-bar-pro{
    background:var(--msg-ai-bg);
    border:1px solid var(--msg-ai-border);
    transition:all .3s;
}

.search-bar-pro:focus-within{
    box-shadow:0 1px 6px rgba(183, 110, 121, 0.2);
    border-color:var(--vasuki-accent);
}

#input-box{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    font-size:16px;
    caret-color:var(--vasuki-accent);
    color: var(--text-main);
}

.message-bubble{
    max-width:85%;
    padding:12px 20px;
    border-radius:18px;
    font-size:15px;
    line-height:1.5;
}

.user-message{
    background:var(--msg-user-bg);
    color: var(--text-main);
    align-self:flex-end;
    border-bottom-right-radius:4px;
}

.ai-message{
    background:var(--msg-ai-bg);
    color: var(--text-main);
    align-self:flex-start;
    border-bottom-left-radius:4px;
    border:1px solid var(--msg-ai-border);
}

.typing-dot{
    width:6px;
    height:6px;
    background:var(--text-secondary);
    border-radius:50%;
    display:inline-block;
    animation:pulse 1.5s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{opacity:.3;transform:scale(.8);}
    50%{opacity:1;transform:scale(1.1);}
}

.blob{
    position:fixed;
    z-index:-1;
    filter:blur(80px);
    opacity:.4;
    border-radius:50%;
}
</style>
</head>

<body>

<div class="blob w-96 h-96 bg-rose-900/20 -top-20 -left-20"></div>
<div class="blob w-80 h-80 bg-rose-800/20 bottom-0 right-0"></div>

<nav class="navbar justify-between">
    <h1 class="logo-text text-2xl font-bold">VASUKI</h1>
    <button id="theme-toggle" class="px-3 py-1 border rounded border-rose-300/30 text-rose-200">Toggle Theme</button>
</nav>

<main class="flex-1 flex items-center justify-center p-4">
<div class="glass-card w-full max-w-4xl flex flex-col h-[75vh]">

<div id="chat-window" class="flex-1 overflow-y-auto p-8 flex flex-col space-y-4">
<div id="welcome-msg" class="text-center py-20">
<h2 class="text-3xl font-bold mb-3">Vasuki Intelligence</h2>
<p class="text-gray-400">Access real-time professional insights.</p>
</div>
</div>

<div class="p-6 border-t border-rose-300/10 bg-white/5 rounded-b-3xl">
<div class="search-bar-pro rounded-full flex items-center px-6 py-3.5">
<input id="input-box" placeholder="Ask Vasuki Intelligence..." autocomplete="off" autofocus>
<button id="send-btn" class="ml-4 font-semibold text-rose-400 hover:text-rose-300 transition-colors">Send</button>
</div>
</div>

</div>
</main>

<footer class="py-6 text-center text-gray-500 text-xs">
© 2026 VASUKI.CLOUD
</footer>

<script>
const chatWindow = document.getElementById('chat-window');
const welcomeMsg = document.getElementById('welcome-msg');
const inputBox = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');
const themeToggle = document.getElementById('theme-toggle');
const rootEl = document.documentElement;

let isProcessing = false;
const HISTORY_KEY = 'vasuki-history';
let restoringHistory = false;

async function getVasukiResponse(topic){
    try{
        const res = await fetch(`https://adamyakhairwal2011-vasuki-ai.hf.space/research?topic=${encodeURIComponent(topic)}`);
        return await res.text();
    }catch{
        return "System Error: Unable to connect to Vasuki Engine.";
    }
}

function addMessage(text,isUser){
    if(welcomeMsg) welcomeMsg.remove();
    const div=document.createElement('div');
    div.className=`message-bubble ${isUser?'user-message':'ai-message'}`;
    div.innerHTML=text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
    chatWindow.appendChild(div);
    chatWindow.scrollTop=chatWindow.scrollHeight;

    if(!restoringHistory){
        try{
            const raw = localStorage.getItem(HISTORY_KEY);
            const arr = raw ? JSON.parse(raw) : [];
            arr.push({ role: isUser ? 'user' : 'ai', text, ts: Date.now() });
            if (arr.length > 200) arr.shift();
            localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
        }catch{}
    }
}

function showTyping(){
    const div=document.createElement('div');
    div.id='typing-indicator';
    div.className='ai-message message-bubble flex space-x-1';
    div.innerHTML='<span class="typing-dot"></span><span class="typing-dot" style="animation-delay:.2s"></span><span class="typing-dot" style="animation-delay:.4s"></span>';
    chatWindow.appendChild(div);
    chatWindow.scrollTop=chatWindow.scrollHeight;
}

async function handleAction(){
    if(isProcessing) return;
    const val=inputBox.value.trim();
    if(!val) return;

    isProcessing=true;
    inputBox.value='';
    addMessage(val,true);
    showTyping();

    const response=await getVasukiResponse(val);
    document.getElementById('typing-indicator')?.remove();
    addMessage(response,false);

    isProcessing=false;
}

sendBtn.addEventListener('click',handleAction);

inputBox.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
        e.preventDefault();
        handleAction();
    }
});

themeToggle.addEventListener('click',()=>{
    const isRose=rootEl.getAttribute('data-theme')==='rose-gold';
    if(isRose){
        rootEl.removeAttribute('data-theme');
        localStorage.removeItem('theme');
    }else{
        rootEl.setAttribute('data-theme','rose-gold');
        localStorage.setItem('theme','rose-gold');
    }
});

// Restore history on load
(function restoreHistory(){
    try{
        const raw = localStorage.getItem(HISTORY_KEY);
        if(!raw) return;
        const arr = JSON.parse(raw);
        if(!Array.isArray(arr) || arr.length===0) return;
        restoringHistory = true;
        for(const m of arr){
            if(m && typeof m.text==='string' && (m.role==='user' || m.role==='ai')){
                addMessage(m.text, m.role==='user');
            }
        }
    }finally{
        restoringHistory = false;
    }
})();
</script>

</body>
</html>
