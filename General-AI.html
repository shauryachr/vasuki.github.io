<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vasuki Labs - AI</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* ===== ORIGINAL LIGHT THEME ===== */

:root{
--primary:#1a73e8;
--primary-hover:#1557b0;
--text:#202124;
--text-secondary:#5f6368;
--background:#ffffff;
--surface:#f8f9fa;
--border:#dadce0;
}

body{
font-family:Roboto;
background:var(--background);
color:var(--text);
margin:0;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
border-right:1px solid var(--border);
padding:15px;
display:flex;
flex-direction:column;
}

.logo{
color:var(--primary);
font-weight:700;
font-size:20px;
margin-bottom:15px;
}

.new-chat{
background:var(--primary);
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.chat-item:hover{
background:var(--surface);
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:10px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
}

/* CHAT */

#chatArea{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.user-msg{
align-self:flex-end;
background:var(--surface);
padding:10px;
border-radius:12px;
}

.bot-msg{
align-self:flex-start;
}

/* INPUT */

.input-box{
padding:10px;
border-top:1px solid var(--border);
}

input{
width:100%;
padding:12px;
border-radius:20px;
border:1px solid var(--border);
outline:none;
}

/* AUTH */

.auth{
position:fixed;
inset:0;
background:#0004;
display:flex;
justify-content:center;
align-items:center;
}

.auth-box{
background:white;
padding:20px;
border-radius:8px;
display:flex;
flex-direction:column;
gap:10px;
width:260px;
}

button{cursor:pointer}

</style>

</head>

<body>

<!-- AUTH -->
<div class="auth" id="authBox">
<div class="auth-box">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>

<p style="font-size:12px;color:#666">
No account? <a href="https://vasuki.cloud" target="_blank">Create on Vasuki.cloud</a>
</p>

</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">VASUKI LABS</div>
<button class="new-chat" id="newChatBtn">+ New Chat</button>
<div id="chatList"></div>
</div>

<!-- MAIN -->
<div class="main">

<header>
<div>AI Assistant</div>
<div id="userInfo"></div>
</header>

<div id="chatArea"></div>

<div class="input-box">
<input id="query" placeholder="Ask anything...">
</div>

</div>

<script type="module">

import Vasuki from "https://cdn.jsdelivr.net/npm/vasuki-db/+esm";

const vdb = new Vasuki();

/* ELEMENTS */
const email = document.getElementById("email");
const password = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const authBox = document.getElementById("authBox");
const userInfo = document.getElementById("userInfo");
const chatList = document.getElementById("chatList");
const chatArea = document.getElementById("chatArea");
const query = document.getElementById("query");
const newChatBtn = document.getElementById("newChatBtn");

/* AI */
const API_URL = "https://adamyakhairwal2011-vasuki-ai.hf.space/research";

/* AUTH */

let currentUser=null;

loginBtn.onclick = async ()=>{

try{
await vdb.login(email.value,password.value);

currentUser=email.value;
userInfo.innerText="👤 "+currentUser;

authBox.style.display="none";

await loadChats();

if(chats.length===0) newChat();

}catch{
alert("No account found. Create one on Vasuki.cloud");
}

};

/* CHAT STORAGE */

async function saveChat(chat){

const all = await vdb.fetchTable("Main","Chats");

for(const c of all){
if(c.user===currentUser && c.chatId===chat.id){
await vdb.delete("Main","Chats",c.id);
}
}

await vdb.insert("Main","Chats",{
user:currentUser,
chatId:chat.id,
messages:JSON.stringify(chat.messages)
});

}

async function loadChats(){

const data=await vdb.fetchTable("Main","Chats");

const userChats=data.filter(c=>c.user===currentUser);

const map={};

userChats.forEach(c=>{
if(!map[c.chatId]){
map[c.chatId]={id:c.chatId,messages:[]};
}
map[c.chatId].messages=JSON.parse(c.messages);
});

chats=Object.values(map);

renderChats();
}

/* CHAT SYSTEM */

let chats=[];
let currentChat=null;

newChatBtn.onclick=newChat;

function newChat(){
const chat={id:Date.now(),messages:[]};
chats.push(chat);
currentChat=chat;
renderChats();
renderMessages();
}

function renderChats(){
chatList.innerHTML="";
chats.forEach(c=>{
const d=document.createElement("div");
d.className="chat-item";
d.innerText="Chat "+c.id;
d.onclick=()=>{currentChat=c;renderMessages()};
chatList.appendChild(d);
});
}

function renderMessages(){
chatArea.innerHTML="";
if(!currentChat) return;
currentChat.messages.forEach(m=>{
addMessage(m.text,m.type);
});
}

/* ENTER */

query.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

/* SEND */

async function sendMessage(){

const text=query.value.trim();
if(!text || !currentChat) return;

addMessage(text,"user");
currentChat.messages.push({text:text,type:"user"});
query.value="";

const botMsg=addMessage("","bot");

try{

const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
topic:text,
mode:"research"
})
});

const data=await res.json();

const reply=data.result || "No response";

stream(botMsg,reply);

currentChat.messages.push({text:reply,type:"bot"});

await saveChat(currentChat);

}catch{
botMsg.innerText="AI Error";
}

}

/* UI */

function addMessage(text,type){
const d=document.createElement("div");
d.className=type==="user"?"user-msg":"bot-msg";
d.innerText=text;
chatArea.appendChild(d);
chatArea.scrollTop=chatArea.scrollHeight;
return d;
}

function stream(el,text){
let i=0;
(function t(){
if(i<text.length){
el.innerText+=text[i++];
setTimeout(t,10);
}
})();
}

</script>

</body>
</html>
