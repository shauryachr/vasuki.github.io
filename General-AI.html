<html lang="en"><head>
  <meta charset="UTF-8">
  <title>Vasuki Intelligence - Vasuki Labs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

  <style>
    :root {
      --bg-color: #212121;
      --text-main: #ffca28;
      --text-sub: #b0bec5;
      --white: #333333;
      --border: #424242;
      --accent: #ffca28;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Google Sans', Roboto, Arial, sans-serif; 
      background-color: var(--bg-color); 
      color: var(--text-main); 
      height: 100vh; 
      display: flex; 
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    header {
      width: 100%;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 18px; font-weight: 500; color: var(--accent); letter-spacing: 0.5px; }

    .cloud-btn {
      background: linear-gradient(45deg, #ffca28, #ffd54f, #ffb300);
      background-size: 200% auto;
      color: #000;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(255, 202, 40, 0.4);
      transition: 0.3s;
      animation: shine 3s radial-gradient infinite;
    }

    .cloud-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 202, 40, 0.6);
      background-position: right center;
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      margin-top: 15vh;
      height: 55vh; 
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .greeting { font-size: 36px; font-weight: 400; margin-bottom: 8px; color: var(--text-main); margin-top:10vh;}
    .greeting span { display: block; font-size: 18px; color: var(--text-sub); margin-bottom: 4px; }

    .input-wrapper {
      width: 90%;
      max-width: 720px;
      background: var(--white);
      border-radius: 28px;
      padding: 12px 24px;
      margin-top: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
    }

    .input-top { display: flex; align-items: center; width: 100%; gap: 10px; }
    input#query {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
      padding: 12px 0;
      color: #ffffff;
      background: transparent;
    }

    .stop-btn-container {
      position: relative;
      display: none; 
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
    }

    .loader-ring {
      position: absolute;
      width: 100%; height: 100%;
      border: 3px solid #444;
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #stopBtn {
      position: relative;
      width: 12px; height: 12px;
      background: var(--accent);
      border: none; border-radius: 2px;
      cursor: pointer; z-index: 2;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    .input-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 8px;
    }

    .tools-group { color: var(--text-sub); font-size: 14px; }
    .tool-btn { cursor: pointer; padding: 6px 12px; border-radius: 8px; background-color: #444; color: var(--accent);}

    pre {
      position: relative;
      padding: 1em !important;
      border-radius: 12px !important;
      margin: 1.5em 0 !important;
      background: #1a1a1a !important;
    }

    .code-copy-btn {
      position: absolute;
      top: 10px; right: 10px;
      padding: 6px 10px;
      background: rgba(255, 202, 40, 0.2);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer; opacity: 0;
    }

    pre:hover .code-copy-btn { opacity: 1; }

    .mode-select-container { position: relative; }
    #modeLabel { font-size: 13px; color: #000; font-weight: 600; cursor: pointer; padding: 6px 12px; border-radius: 18px; background: var(--accent); }
    
    .mode-dropdown {
      position: absolute;
      bottom: 110%; right: 0;
      background: #333;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      width: 120px;
      z-index: 100;
      border: 1px solid var(--border);
    }
    .mode-option { padding: 10px 15px; font-size: 13px; cursor: pointer; color: #fff; }
    .mode-option:hover { background: var(--accent); color: #000; }

    .chips-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
      max-width: 700px;
    }

    .chip {
      background: var(--white);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 14px;
      color: var(--text-sub);
      cursor: pointer;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

    #chatArea {
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 40px;
      margin-top: 80px;
      padding: 40px 20px;
      height: calc(100vh - 240px); 
      scroll-behavior: smooth;
    }

    .message { max-width: 100%; line-height: 1.6; font-size: 16px; position: relative; }
    .user-msg { align-self: flex-end; color: #ffffff; font-size: 24px; text-align: right; }
    .bot-msg { align-self: flex-start; color: #e0e0e0; width: 100%; }

    .docked-footer {
      position: fixed;
      bottom: 24px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 10;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Vasuki Intelligence</div>
  <div class="header-right">
    <a href="https://vasuki.cloud/" target="_blank" class="cloud-btn">Enjoy our Cloud!</a>
  </div>
</header>

<div class="container" id="homeUI">
  <div class="greeting">
    <span id="userName">Hi User!</span>
    Where should we start?
  </div>

  <div class="input-wrapper" id="mainInput">
    <div class="input-top">
      <input type="text" id="query" placeholder="Ask Vasuki Intelligence..." autocomplete="off">
      <div class="stop-btn-container" id="stopContainer">
        <div class="loader-ring"></div>
        <button id="stopBtn" onclick="stopAIResponse()" title="Stop response"></button>
      </div>
    </div>
    <div class="input-bottom">
      <div class="tools-group">
        <div class="tool-btn">Vasuki Intelligence</div>
      </div>
      <div class="mode-select-container">
        <div id="modeLabel" onclick="toggleModeDropdown()">Ask ?</div>
        <div class="mode-dropdown" id="modeDropdown">
          <div class="mode-option" onclick="setMode('ask')">Ask</div>
          <div class="mode-option" onclick="setMode('research')">Research</div>
          <div class="mode-option" onclick="setMode('coder')">Coder</div>
        </div>
      </div>
    </div>
  </div>

 <div class="chips-container">
    <div class="chip" onclick="handleQuickAction('Write HTML &amp; CSS code to make a website in one file')">
      <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
      Coding Help
    </div>
    <div class="chip" onclick="handleQuickAction('Write a professional email to a client')">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      Write anything
    </div>
    <div class="chip" onclick="handleQuickAction('Suggest a 10 minute workout plan')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
      Boost my day
    </div>
    <div class="chip" onclick="handleQuickAction('Tell me a joke to make my day better')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
      Make Me Smile														
    </div>
</div>
</div>

<div id="chatArea"></div>
<div id="footerDock" class="hidden docked-footer"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://aitckloahlwemlekaour.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdGNrbG9haGx3ZW1sZWthb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyOTQ3MTMsImV4cCI6MjA3MTg3MDcxM30.uQjQLSz0mQuuArPQ_F8u-suQ-6T0e9bF11ahQtSw6yA";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const queryInput = document.getElementById('query');
  const stopContainer = document.getElementById('stopContainer');
  const homeUI = document.getElementById('homeUI');
  const chatArea = document.getElementById('chatArea');
  const footerDock = document.getElementById('footerDock');
  const mainInput = document.getElementById('mainInput');
  const modeLabel = document.getElementById('modeLabel');
  const modeDropdown = document.getElementById('modeDropdown');
  const userNameDisplay = document.getElementById('userName');

  let currentMode = 'ask';
  let abortController = null;

  async function initUser() {
    const vcloudUser = localStorage.getItem('vcloud_user');
    if (!vcloudUser) return;
    try {
      const { data } = await supabase.from('users').select('name').eq('username', vcloudUser).single();
      if (data && data.name) {
        userNameDisplay.textContent = `Welcome Back, ${data.name}`;
      }
    } catch (err) {}
  }
  initUser();

  function renderContent(text) {
    let processed = text.replace(/\\\[/g, '$$$$').replace(/\\\]/g, '$$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
    let htmlContent = marked.parse(processed);
    const temp = document.createElement('div');
    temp.innerHTML = htmlContent;

    temp.innerHTML = temp.innerHTML.replace(/\$\$([\s\S]+?)\$\$/g, (_, formula) => katex.renderToString(formula, { displayMode: true, throwOnError: false }));
    temp.innerHTML = temp.innerHTML.replace(/\$([^\$\n]+?)\$/g, (_, formula) => katex.renderToString(formula, { displayMode: false, throwOnError: false }));

    temp.querySelectorAll('pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.innerText = 'Copy';
        btn.onclick = () => {
            const code = pre.querySelector('code')?.innerText || pre.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = 'Copy', 2000);
        };
        pre.appendChild(btn);
    });
    return temp.innerHTML;
  }

  window.toggleModeDropdown = () => modeDropdown.style.display = modeDropdown.style.display === 'flex' ? 'none' : 'flex';
  window.setMode = (mode) => {
    currentMode = mode;
    modeLabel.textContent = mode.charAt(0).toUpperCase() + mode.slice(1) + ' ?';
    modeDropdown.style.display = 'none';
  }
  window.stopAIResponse = () => abortController?.abort();

  async function startConversation(text) {
    if (!text.trim()) return;
    document.querySelector(".greeting").style.display = 'none';
    if (!homeUI.classList.contains('hidden')) {
      homeUI.style.display = 'none';
      chatArea.style.display = 'flex';
      footerDock.classList.remove('hidden');
      footerDock.appendChild(mainInput);
    }

    const uMsg = document.createElement('div');
    uMsg.className = 'message user-msg';
    uMsg.textContent = text;
    chatArea.appendChild(uMsg);
    queryInput.value = '';

    const bMsg = document.createElement('div');
    bMsg.className = 'message bot-msg';
    const contentDiv = document.createElement('div');
    contentDiv.innerHTML = '<em>Thinking...</em>';
    bMsg.appendChild(contentDiv);
    chatArea.appendChild(bMsg);

    stopContainer.style.display = 'flex';
    abortController = new AbortController();

    try {
      const resp = await fetch(`https://adamyakhairwal2011-vasuki-ai.hf.space/research?topic=${encodeURIComponent(text)}&mode=${currentMode}`, {
        signal: abortController.signal
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "";

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        fullText += decoder.decode(value, {stream: true});
        contentDiv.innerHTML = renderContent(fullText);
        Prism.highlightAllUnder(contentDiv);
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'auto' });
      }
    } catch (e) {
      contentDiv.innerHTML = e.name === 'AbortError' ? "<em>Stopped.</em>" : "<p style='color:red'>Error.</p>";
    } finally {
      stopContainer.style.display = 'none';
    }
  }

  queryInput.addEventListener('keydown', (e) => e.key === 'Enter' && startConversation(queryInput.value));
  window.handleQuickAction = (t) => startConversation(t);
</script>
</body></html>
