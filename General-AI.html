<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vasuki AI</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#fbbc05;
--background:#f1f3f4;
--surface:#fff;
--border:#dadce0;
--text:#202124;
}

body{
margin:0;
font-family:Roboto;
background:var(--background);
color:var(--text);
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */
header{
width:100%;
padding:16px;
background:var(--surface);
border-bottom:1px solid var(--border);
}

/* INPUT */
.input-wrapper{
margin-top:120px;
background:var(--surface);
border:1px solid var(--border);
border-radius:24px;
padding:12px 20px;
width:600px;
}

input{
width:100%;
border:none;
outline:none;
}

/* CHAT */
#chatArea{
display:none;
flex-direction:column;
width:600px;
margin-top:20px;
gap:10px;
}

.user-msg{
align-self:flex-end;
background:#ffe082;
padding:10px;
border-radius:12px;
}

.bot-msg{
align-self:flex-start;
white-space:pre-wrap;
}

/* LOGIN */
#loginPopup{
position:fixed;
inset:0;
background:#0006;
display:flex;
align-items:center;
justify-content:center;
}

#loginBox{
background:#fff;
padding:20px;
border-radius:10px;
width:280px;
}

#loginBox input{
width:100%;
margin-bottom:10px;
padding:10px;
}

#loginBox button{
width:100%;
padding:10px;
background:#fbbc05;
border:none;
}

/* STOP */
#stopBtn{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPopup">
<div id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
</div>
</div>

<header>VASUKI LABS</header>

<div class="input-wrapper">
<input id="query" placeholder="Ask...">
</div>

<button id="stopBtn">Stop</button>

<div id="chatArea"></div>

<script type="module">

import Vasuki from "https://cdn.jsdelivr.net/npm/vasuki-db/+esm";

const vdb = new Vasuki();

/* ELEMENTS */
const query = document.getElementById("query");
const chatArea = document.getElementById("chatArea");
const loginBtn = document.getElementById("loginBtn");
const loginPopup = document.getElementById("loginPopup");
const stopBtn = document.getElementById("stopBtn");

/* STATE */
let currentUser=null;
let currentChat={id:Date.now(),messages:[]};

/* LOGIN */
loginBtn.onclick = async ()=>{
try{
await vdb.login(email.value,password.value);
currentUser=email.value;
loginPopup.style.display="none";

await loadChats();

}catch{
alert("Create account on vasuki.cloud");
}
};

/* LOAD CHAT HISTORY */
async function loadChats(){

const data = await vdb.fetchTable("Main","Chats");

/* FILTER USER */
const userChats = data.filter(c=>c.user===currentUser);

if(userChats.length>0){

const last = userChats[userChats.length-1];

currentChat = {
id:last.chatId,
messages:JSON.parse(last.messages)
};

/* RENDER */
currentChat.messages.forEach(m=>{
addMessage(m.text,m.type);
});

}

}

/* SAVE CHAT */
async function saveChat(){

await vdb.insert("Main","Chats",{
user:currentUser,
chatId:currentChat.id,
messages:JSON.stringify(currentChat.messages)
});

}

/* ENTER */
query.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

/* AI */
let controller=null;

async function sendMessage(){

const text=query.value.trim();
if(!text) return;

chatArea.style.display="flex";

addMessage(text,"user");
currentChat.messages.push({text,type:"user"});

query.value="";

const bot=addMessage("","bot");

if(controller) controller.abort();
controller=new AbortController();

stopBtn.style.display="block";

try{

const res = await fetch(
`https://adamyakhairwal2011-vasuki-ai.hf.space/research?topic=${encodeURIComponent(text)}&mode=research`,
{signal:controller.signal}
);

const data = await res.json();

const reply=data.result || "No response";

stream(bot,reply);

currentChat.messages.push({text:reply,type:"bot"});

await saveChat();

}catch(err){

if(err.name==="AbortError"){
bot.innerText="Stopped";
}else{
bot.innerText="Error";
}

}

stopBtn.style.display="none";
}

/* STOP */
stopBtn.onclick=()=>{
if(controller) controller.abort();
};

/* UI */
function addMessage(t,type){
const d=document.createElement("div");
d.className=type==="user"?"user-msg":"bot-msg";
d.innerText=t;
chatArea.appendChild(d);
return d;
}

function stream(el,text){
let i=0;
(function(){
if(i<text.length){
el.innerText+=text[i++];
setTimeout(arguments.callee,10);
}
})();
}

</script>

</body>
</html>
