<!-- ONLY SHOWING MODIFIED SCRIPT PART -->

<script type="module">

import Vasuki from "https://esm.sh/vasuki-db";

/* ================= DB SETUP ================= */

const vdb = new Vasuki();

// ⚠️ PUT YOUR REAL LOGIN HERE
await vdb.login("YOUR_EMAIL", "YOUR_PASSWORD");

async function saveChatToVasuki(userMessage, botResponse) {
    try {
        await vdb.insert("Main", "Chats", {
            userMessage,
            botResponse,
            time: new Date().toISOString()
        });
        console.log("Saved to Vasuki DB");
    } catch (err) {
        console.error("Vasuki DB Error:", err);
    }
}

/* ================= YOUR EXISTING CODE ================= */

const queryInput = document.getElementById('query');
const stopContainer = document.getElementById('stopContainer');
const homeUI = document.getElementById('homeUI');
const chatArea = document.getElementById('chatArea');
const footerDock = document.getElementById('footerDock');
const mainInput = document.getElementById('mainInput');
const modeLabel = document.getElementById('modeLabel');
const modeDropdown = document.getElementById('modeDropdown');

let currentMode = 'code';
let abortController = null;

function renderContent(text) {
let processed = text.replace(/\\\[/g, '$$$$').replace(/\\\]/g, '$$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
let htmlContent = marked.parse(processed);

const temp = document.createElement('div');
temp.innerHTML = htmlContent;

temp.innerHTML = temp.innerHTML.replace(/\$\$([\s\S]+?)\$\$/g, (_, formula) => katex.renderToString(formula, { displayMode: true, throwOnError: false }));
temp.innerHTML = temp.innerHTML.replace(/\$([^\$\n]+?)\$/g, (_, formula) => katex.renderToString(formula, { displayMode: false, throwOnError: false }));

temp.querySelectorAll('pre').forEach(pre => {
const btn = document.createElement('button');
btn.className = 'code-copy-btn';
btn.innerText = 'Copy';
btn.onclick = () => {
const code = pre.querySelector('code')?.innerText || pre.innerText;
navigator.clipboard.writeText(code);
btn.innerText = 'Copied!';
setTimeout(() => btn.innerText = 'Copy', 2000);
};
pre.appendChild(btn);
});

return temp.innerHTML;
}

window.toggleModeDropdown = () => modeDropdown.style.display = modeDropdown.style.display === 'flex' ? 'none' : 'flex';
window.setMode = (mode) => {
currentMode = mode;
modeLabel.textContent = mode.charAt(0).toUpperCase() + mode.slice(1) + ' ▾';
modeDropdown.style.display = 'none';
}
window.stopAIResponse = () => abortController?.abort();

async function startConversation(text) {

document.querySelector(".greeting").style.display = 'none';
document.querySelector(".container").style.display = 'none';

if (!text.trim()) return;

if (!homeUI.classList.contains('hidden')) {
homeUI.classList.add('hidden');
chatArea.style.display = 'flex';
footerDock.classList.remove('hidden');
footerDock.appendChild(mainInput);
}

const uMsg = document.createElement('div');
uMsg.className = 'message user-msg';
uMsg.textContent = text;
chatArea.appendChild(uMsg);

queryInput.value = '';

const bMsg = document.createElement('div');
bMsg.className = 'message bot-msg';

const contentDiv = document.createElement('div');
contentDiv.innerHTML = '<em>Thinking...</em>';
bMsg.appendChild(contentDiv);

chatArea.appendChild(bMsg);

stopContainer.style.display = 'flex';
abortController = new AbortController();

try {

const resp = await fetch(`https://adamyakhairwal2011-vasuki-ai.hf.space/research?topic=${encodeURIComponent(text)}&mode=${currentMode}`, {
signal: abortController.signal
});

const reader = resp.body.getReader();
const decoder = new TextDecoder();

let fullText = "";

while (true) {
const {done, value} = await reader.read();
if (done) break;

fullText += decoder.decode(value, {stream: true});

contentDiv.innerHTML = renderContent(fullText);
Prism.highlightAllUnder(contentDiv);

chatArea.scrollTo({ top: chatArea.scrollHeight });
}

/* ✅ SAVE TO VASUKI DB */
saveChatToVasuki(text, fullText);

} catch (e) {
contentDiv.innerHTML = e.name === 'AbortError'
? "<em>Stopped.</em>"
: "<p style='color:#ea4335'>Error connecting to AI service.</p>";
} finally {
stopContainer.style.display = 'none';
}

}

queryInput.addEventListener('keydown', (e) => {
if (e.key === 'Enter') startConversation(queryInput.value);
});

window.handleQuickAction = (t) => startConversation(t);

</script>
