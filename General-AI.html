<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vasuki AI - Real Auth</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* ===== UI SAME ===== */

body{
margin:0;
font-family:Roboto;
background:#020617;
color:#e5e7eb;
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#0f172a;
padding:15px;
display:flex;
flex-direction:column;
}

.logo{color:#06b6d4;font-weight:700;margin-bottom:15px}

.new-chat{
background:#7c3aed;
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
}

.chat-item{
padding:8px;
cursor:pointer;
border-radius:8px;
}

.chat-item:hover{background:rgba(255,255,255,0.05)}

.main{flex:1;display:flex;flex-direction:column}

header{
padding:10px;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
}

#chatArea{
flex:1;
padding:15px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.user-msg{
align-self:flex-end;
background:#7c3aed33;
padding:10px;
border-radius:10px;
}

.bot-msg{
align-self:flex-start;
white-space:pre-wrap;
}

.input-box{
padding:10px;
border-top:1px solid #222;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

/* AUTH */

.auth{
position:fixed;
inset:0;
background:#000c;
display:flex;
justify-content:center;
align-items:center;
}

.auth-box{
background:#0f172a;
padding:20px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:10px;
width:250px;
}

</style>

</head>

<body>

<!-- AUTH -->
<div class="auth" id="authBox">
<div class="auth-box">
<h3>Login with Vasuki</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">VASUKI AI</div>
<button class="new-chat" onclick="newChat()">+ New Chat</button>
<div id="chatList"></div>
</div>

<!-- MAIN -->
<div class="main">

<header>
<div>⚡ Vasuki AI</div>
<div id="userInfo"></div>
</header>

<div id="chatArea"></div>

<div class="input-box">
<input id="query" placeholder="Ask anything...">
</div>

</div>

<script type="module">

import Vasuki from "https://cdn.jsdelivr.net/npm/vasuki-db/+esm";

const vdb = new Vasuki();

/* ===== AI ===== */
const API_URL = "https://adamyakhairwal2011-vasuki-ai.hf.space/research";

/* ===== AUTH ===== */

let currentUser = null;

window.login = async ()=>{

try{
await vdb.login(email.value, password.value);

currentUser = email.value;
userInfo.innerText = "👤 " + currentUser;

authBox.style.display="none";

/* load user chats */
loadChats();

}catch{
alert("Login failed");
}

};

/* ===== CHAT STORAGE IN VASUKI ===== */

async function saveChat(chat){
await vdb.insert("Main","Chats",{
user: currentUser,
chat
});
}

async function loadChats(){

const data = await vdb.fetchTable("Main","Chats");

const userChats = data.filter(c=>c.user===currentUser);

chats = userChats.map(c=>c.chat);

renderChats();
}

/* ===== CHAT SYSTEM ===== */

let chats=[];
let currentChat=null;

function newChat(){
const chat={id:Date.now(),messages:[]};
chats.push(chat);
currentChat=chat;
renderChats();
renderMessages();
}

function renderChats(){
chatList.innerHTML="";
chats.forEach(c=>{
const d=document.createElement("div");
d.className="chat-item";
d.innerText="Chat "+c.id;
d.onclick=()=>{currentChat=c;renderMessages()};
chatList.appendChild(d);
});
}

function renderMessages(){
chatArea.innerHTML="";
if(!currentChat) return;
currentChat.messages.forEach(m=>{
addMessage(m.text,m.type);
});
}

/* ===== SEND ===== */

query.addEventListener("keydown",e=>{
if(e.key==="Enter") sendMessage();
});

async function sendMessage(){

const text=query.value.trim();
if(!text || !currentChat) return;

addMessage(text,"user");
currentChat.messages.push({text,type:"user"});
query.value="";

const botMsg=addMessage("","bot");

try{

const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
topic:text,
mode:"research"
})
});

const data=await res.json();

stream(botMsg,data.result);

currentChat.messages.push({text:data.result,type:"bot"});

/* SAVE TO VASUKI */
await saveChat(currentChat);

}catch{
botMsg.innerText="⚠️ AI Error";
}

}

/* ===== UI ===== */

function addMessage(text,type){

const d=document.createElement("div");
d.className=type==="user"?"user-msg":"bot-msg";
d.innerText=text;

chatArea.appendChild(d);
chatArea.scrollTop=chatArea.scrollHeight;

return d;
}

function stream(el,text){
let i=0;
(function t(){
if(i<text.length){
el.innerText+=text[i++];
setTimeout(t,10);
}
})();
}

</script>

</body>
</html>
