<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vasuki Assistant</title>

  <!-- MathJax & Prism links remain the same -->

  <style>
    /* your existing styles */

    #admin-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      color: white;
      font-family: monospace;
      padding: 2rem;
      overflow-y: auto;
    }

    #admin-panel.show {
      display: block;
    }

    .admin-section {
      margin: 1.5rem 0;
      padding: 1rem;
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    input, button {
      padding: 0.6rem 1rem;
      margin: 0.4rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #334155;
    }

    #overrides-list {
      margin-top: 1rem;
    }

    .override-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem;
      background: #1e293b;
      margin: 0.4rem 0;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<!-- your existing HTML -->

<div id="admin-panel">
  <h2>Vasuki Admin Panel</h2>
  <p style="color:#94a3b8;">Custom URL: <code>/admin-vasuki-2025</code></p>

  <div class="admin-section">
    <h3>Set temporary chat limit override</h3>
    <p>Enter client device fingerprint (ask them to open dev tools → Application → Storage → Local Storage → key: deviceId)</p>
    
    <input type="text" id="client-fingerprint" placeholder="Client device fingerprint" style="width:320px;">
    <input type="number" id="override-limit" placeholder="Max chats (e.g. 50)" min="21" value="50">
    <button onclick="addOverride()">Add Override</button>
  </div>

  <div class="admin-section">
    <h3>Active overrides</h3>
    <div id="overrides-list"></div>
  </div>

  <button onclick="closeAdmin()">Close Admin</button>
</div>

<script>
// ──────────────────────────────────────────────
//  Your existing code (chats, messages, etc.)
// ──────────────────────────────────────────────

// Add this at the top of your <script>

const ADMIN_PATH = '/admin-vasuki-2025';
const OVERRIDE_KEY = 'vasuki_chat_limit_overrides';

let overrides = JSON.parse(localStorage.getItem(OVERRIDE_KEY)) || {};

// Check if we are on admin URL
if (window.location.pathname === ADMIN_PATH) {
  document.getElementById('admin-panel').classList.add('show');
  renderOverrides();
}

// Admin functions
function addOverride() {
  const fp = document.getElementById('client-fingerprint').value.trim();
  const limit = parseInt(document.getElementById('override-limit').value);

  if (!fp || isNaN(limit) || limit <= 20) {
    alert('Enter valid fingerprint and limit > 20');
    return;
  }

  overrides[fp] = {
    maxChats: limit,
    added: new Date().toISOString()
  };

  localStorage.setItem(OVERRIDE_KEY, JSON.stringify(overrides));
  renderOverrides();

  alert(`Override added for fingerprint: ${fp}\nNew limit: ${limit}`);
}

function removeOverride(fp) {
  delete overrides[fp];
  localStorage.setItem(OVERRIDE_KEY, JSON.stringify(overrides));
  renderOverrides();
}

function renderOverrides() {
  const list = document.getElementById('overrides-list');
  list.innerHTML = '';

  Object.entries(overrides).forEach(([fp, data]) => {
    const div = document.createElement('div');
    div.className = 'override-item';
    div.innerHTML = `
      <div>
        <strong>${fp.slice(0,12)}...</strong><br>
        Max chats: ${data.maxChats} • Added: ${new Date(data.added).toLocaleString()}
      </div>
      <button onclick="removeOverride('${fp}')">Remove</button>
    `;
    list.appendChild(div);
  });

  if (Object.keys(overrides).length === 0) {
    list.innerHTML = '<p style="color:#94a3b8;">No active overrides yet.</p>';
  }
}

function closeAdmin() {
  window.location.pathname = '/';
}

// ──────────────────────────────────────────────
// In createNewChat() → check override limit
// ──────────────────────────────────────────────

function getMaxChats() {
  const deviceId = localStorage.getItem('deviceId') || generateDeviceId();
  localStorage.setItem('deviceId', deviceId);

  if (overrides[deviceId]) {
    return overrides[deviceId].maxChats;
  }
  return 20;
}

function generateDeviceId() {
  // Very simple fingerprint — good enough for this use-case
  const data = [
    navigator.userAgent,
    screen.width, screen.height,
    new Date().getTimezoneOffset(),
    navigator.language
  ].join('|');
  let hash = 0;
  for (let i = 0; i < data.length; i++) {
    hash = ((hash << 5) - hash) + data.charCodeAt(i);
    hash = hash & hash;
  }
  return 'fp_' + Math.abs(hash).toString(36).slice(0, 12);
}

// Replace your createNewChat with this version
function createNewChat() {
  const currentCount = Object.keys(chats).length;
  const maxAllowed = getMaxChats();

  if (currentCount >= maxAllowed) {
    alert(`You have reached your chat limit (${maxAllowed}).\nClear some chats or contact admin for more.`);
    return;
  }

  const id = Date.now().toString();
  chats[id] = {
    title: 'New Chat',
    messages: [],
    lastUpdated: Date.now()
  };
  currentChatId = id;
  messagesDiv.innerHTML = '<div class="quote-block">Simple, Scalable Tools<br>For Startups And Individuals</div>';
  saveChats();
  renderChatList();
}

// Rest of your code remains the same...
</script>
