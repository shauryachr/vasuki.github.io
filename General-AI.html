<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vasuki Assistant</title>

  <!-- MathJax -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" async></script>

  <!-- Prism dark + line-numbers -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --border: #30363d;
      --accent-blue: #58a6ff;
      --accent-red: #f85149;
      --accent-green: #238636;
      --active-chat: #2d3748;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.9rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-header {
      height: 44px;
      width: auto;
    }
    #mode-toggle {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    button {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.active {
      background: var(--accent-blue);
      color: white;
      border: none;
    }
    #new-chat { background: var(--accent-green); color: white; border: none; }
    #clear-history, #delete-all { background: var(--accent-red); color: white; border: none; }
    #main { flex: 1; display: flex; overflow: hidden; }
    #sidebar {
      width: 280px;
      background: #0d1117;
      border-right: 1px solid var(--border);
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    #chat-search {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #161b22;
      color: var(--text-primary);
      font-size: 0.95rem;
      width: 100%;
      box-sizing: border-box;
    }
    .chat-item {
      padding: 0.7rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      background: #161b22;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.15s;
    }
    .chat-item.active {
      background: var(--active-chat);
      color: white;
      border-color: var(--accent-blue);
    }
    .chat-item.editing { padding: 0; }
    .chat-item input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: none;
      background: transparent;
      color: white;
      font-size: inherit;
      outline: none;
    }
    #messages {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      position: relative;
    }
    .quote-block {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 1.8rem;
      font-weight: 600;
      color: #444c56;
      opacity: 0.5;
      pointer-events: none;
      max-width: 80%;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }
    .quote-block::before, .quote-block::after {
      content: '“';
      font-size: 4rem;
      opacity: 0.3;
      position: absolute;
    }
    .quote-block::before { left: -20px; top: -20px; }
    .quote-block::after { right: -20px; bottom: -40px; transform: rotate(180deg); }
    .message {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      max-width: 90%;
    }
    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: transparent;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user .avatar { background: var(--accent-green); }
    .bubble {
      padding: 1rem 1.3rem;
      border-radius: 6px;
      background: #161b22;
      border: 1px solid var(--border);
      line-height: 1.5;
      font-size: 1rem;
      word-break: break-word;
    }
    .user .bubble {
      background: var(--accent-blue);
      color: white;
      border: none;
    }
    pre {
      background: #0d1117;
      padding: 1.2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow-x: auto;
      margin: 1rem 0;
      max-height: 600px;
      overflow-y: auto;
      position: relative;
      color: #c9d1d9;
    }
    pre.code-long { max-height: 900px; }
    code { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.95rem; }
    .copy-all-btn {
      margin-top: 0.8rem;
      background: var(--accent-green);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #input-container {
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }
    #prompt {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
      resize: vertical;
      min-height: 50px;
      background: #0d1117;
      color: var(--text-primary);
    }
    #send {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 0 1.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    #stop-btn {
      background: var(--accent-red);
      color: white;
      border: none;
      padding: 0 1.4rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      display: none;
    }
    .copy-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: var(--accent-green);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* ─── Admin Panel ──────────────────────────────────────── */
    #admin-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      color: white;
      font-family: monospace;
      padding: 2rem;
      overflow-y: auto;
    }
    #admin-panel.show { display: block; }
    .admin-section {
      margin: 1.5rem 0;
      padding: 1.2rem;
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    input, button {
      padding: 0.6rem 1rem;
      margin: 0.4rem 0.3rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
    }
    button { cursor: pointer; }
    button:hover { background: #334155; }
    #overrides-list { margin-top: 1rem; }
    .override-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 1rem;
      background: #1e293b;
      margin: 0.4rem 0;
      border-radius: 6px;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>

  <header>
    <img src="https://files.oaiusercontent.com/file-2tJ1M0z6kYcM8nZ6v3W0uJ?se=2025-02-25T09%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscca=0&sig=exampleSignatureHere" alt="Vasuki Logo" class="logo-header">
    <div id="mode-toggle">
      <button class="active" id="ask-btn">Ask</button>
      <button id="research-btn">Research</button>
      <button id="new-chat">New Chat</button>
      <button id="clear-history">Clear Current</button>
      <button id="delete-all">Delete All</button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar">
      <input type="text" id="chat-search" placeholder="Search chats..." />
      <div id="chat-list"></div>
    </div>

    <div id="messages">
      <div class="quote-block">
        Simple, Scalable Tools<br>For Startups And Individuals
      </div>
    </div>
  </div>

  <div id="input-container">
    <textarea id="prompt" placeholder="Type your question or topic..." rows="1"></textarea>
    <button id="send">Send</button>
    <button id="stop-btn">Stop</button>
  </div>

  <!-- ─── Hidden Admin Panel ────────────────────────────────────── -->
  <div id="admin-panel">
    <h2>Vasuki Admin Panel</h2>
    <p style="color:#94a3b8; font-size:0.9rem;">
      Secret path: <code>/admin-vasuki-2025</code><br>
      Only you should know this URL
    </p>

    <div class="admin-section">
      <h3>Give client more chats (override 20 limit)</h3>
      <p style="font-size:0.9rem; color:#94a3b8;">
        Ask client to open DevTools (F12) → Application tab → Local Storage → find key <code>deviceId</code>
      </p>
      <input type="text" id="client-fingerprint" placeholder="Client deviceId" style="width:340px;">
      <input type="number" id="override-limit" placeholder="Max chats (e.g. 50)" min="21" value="50">
      <button onclick="addOverride()">Add Override</button>
    </div>

    <div class="admin-section">
      <h3>Active client overrides</h3>
      <div id="overrides-list"></div>
    </div>

    <button onclick="closeAdminPanel()">Close Admin</button>
  </div>

  <script>
    // ──────────────────────────────────────────────
    //  Your existing chat logic (addMessage, sendQuery, etc.)
    // ──────────────────────────────────────────────

    const ADMIN_PATH = '/admin-vasuki-2025';
    const OVERRIDE_KEY = 'vasuki_chat_limit_overrides';
    let overrides = JSON.parse(localStorage.getItem(OVERRIDE_KEY)) || {};

    // Show admin panel if on secret path
    if (window.location.pathname === ADMIN_PATH) {
      document.getElementById('admin-panel').classList.add('show');
      renderOverrides();
      // Hide normal UI
      document.querySelector('header').style.display = 'none';
      document.getElementById('main').style.display = 'none';
      document.getElementById('input-container').style.display = 'none';
    }

    function addOverride() {
      const fp = document.getElementById('client-fingerprint').value.trim();
      const limit = parseInt(document.getElementById('override-limit').value);

      if (!fp || isNaN(limit) || limit <= 20) {
        alert('Enter valid deviceId and limit > 20');
        return;
      }

      overrides[fp] = {
        maxChats: limit,
        added: new Date().toISOString(),
        note: prompt('Optional note about this client:') || ''
      };

      localStorage.setItem(OVERRIDE_KEY, JSON.stringify(overrides));
      renderOverrides();
      alert(`Override added:\nDevice: ${fp.slice(0,12)}...\nLimit: ${limit}`);
    }

    function removeOverride(fp) {
      if (confirm(`Remove override for ${fp.slice(0,12)}...?`)) {
        delete overrides[fp];
        localStorage.setItem(OVERRIDE_KEY, JSON.stringify(overrides));
        renderOverrides();
      }
    }

    function renderOverrides() {
      const list = document.getElementById('overrides-list');
      list.innerHTML = '';

      if (Object.keys(overrides).length === 0) {
        list.innerHTML = '<p style="color:#94a3b8;">No overrides yet.</p>';
        return;
      }

      Object.entries(overrides).forEach(([fp, data]) => {
        const div = document.createElement('div');
        div.className = 'override-item';
        div.innerHTML = `
          <div>
            <strong>${fp}</strong><br>
            Max: ${data.maxChats} • Added: ${new Date(data.added).toLocaleString()}<br>
            <small>Note: ${data.note || '—'}</small>
          </div>
          <button onclick="removeOverride('${fp}')">Remove</button>
        `;
        list.appendChild(div);
      });
    }

    function closeAdminPanel() {
      window.location.pathname = '/';
    }

    // ─── Replace your createNewChat function with this ─────────────
    function createNewChat() {
      const deviceId = localStorage.getItem('deviceId') || generateDeviceId();
      localStorage.setItem('deviceId', deviceId);

      const maxAllowed = overrides[deviceId]?.maxChats || 20;
      const currentCount = Object.keys(chats).length;

      if (currentCount >= maxAllowed) {
        alert(`Chat limit reached (${maxAllowed}).\nClear some chats or contact admin for more access.`);
        return;
      }

      const id = Date.now().toString();
      chats[id] = {
        title: 'New Chat',
        messages: [],
        lastUpdated: Date.now()
      };
      currentChatId = id;
      messagesDiv.innerHTML = '<div class="quote-block">Simple, Scalable Tools<br>For Startups And Individuals</div>';
      saveChats();
      renderChatList();
    }

    // Simple device fingerprint (same as before)
    function generateDeviceId() {
      const data = [
        navigator.userAgent,
        screen.width + 'x' + screen.height,
        new Date().getTimezoneOffset(),
        navigator.language || navigator.userLanguage
      ].join('|');
      let hash = 0;
      for (let i = 0; i < data.length; i++) {
        hash = ((hash << 5) - hash) + data.charCodeAt(i);
        hash |= 0;
      }
      return 'fp_' + Math.abs(hash).toString(36).slice(0, 16);
    }

    // Rest of your code (initChats, loadChat, addMessage, sendQuery, etc.)
    // ... paste your full script logic here ...

    // Make sure to call updateChatTimestamp() after any message is added
// ===== BASIC CHAT STATE =====
let chats = JSON.parse(localStorage.getItem('vasuki_chats')) || {};
let currentChatId = null;
const messagesDiv = document.getElementById('messages');

// ===== SAVE CHATS =====
function saveChats() {
  localStorage.setItem('vasuki_chats', JSON.stringify(chats));
}

// ===== RENDER CHAT LIST =====
function renderChatList() {
  const list = document.getElementById('chat-list');
  list.innerHTML = '';

  Object.entries(chats).forEach(([id, chat]) => {
    const div = document.createElement('div');
    div.className = 'chat-item';
    if (id === currentChatId) div.classList.add('active');
    div.textContent = chat.title;
    div.onclick = () => loadChat(id);
    list.appendChild(div);
  });
}

// ===== LOAD CHAT =====
function loadChat(id) {
  currentChatId = id;
  messagesDiv.innerHTML = '';
  chats[id].messages.forEach(msg => {
    addMessage(msg.role, msg.content, false);
  });
  renderChatList();
}

// ===== ADD MESSAGE =====
function addMessage(role, content, save = true) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ' + role;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;

  msgDiv.appendChild(bubble);
  messagesDiv.appendChild(msgDiv);

  if (save && currentChatId) {
    chats[currentChatId].messages.push({ role, content });
    saveChats();
  }

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ===== BUTTON EVENTS =====
document.getElementById('new-chat').addEventListener('click', createNewChat);

document.getElementById('send').addEventListener('click', () => {
  const input = document.getElementById('prompt');
  const text = input.value.trim();
  if (!text) return;

  if (!currentChatId) createNewChat();

  addMessage('user', text);
  addMessage('ai', 'This is a demo response.');

  input.value = '';
});

document.getElementById('clear-history').addEventListener('click', () => {
  if (!currentChatId) return;
  chats[currentChatId].messages = [];
  messagesDiv.innerHTML = '';
  saveChats();
});

document.getElementById('delete-all').addEventListener('click', () => {
  if (confirm('Delete all chats?')) {
    chats = {};
    currentChatId = null;
    messagesDiv.innerHTML = '';
    saveChats();
    renderChatList();
  }
});

document.getElementById('ask-btn').addEventListener('click', () => {
  document.getElementById('ask-btn').classList.add('active');
  document.getElementById('research-btn').classList.remove('active');
});

document.getElementById('research-btn').addEventListener('click', () => {
  document.getElementById('research-btn').classList.add('active');
  document.getElementById('ask-btn').classList.remove('active');
});
  </script>
</body>
</html>
