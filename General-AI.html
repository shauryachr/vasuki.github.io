<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vasuki Coder - AI Code Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<style>

/* ===== YOUR ORIGINAL UI (UNCHANGED) ===== */

:root{
--primary:#1a73e8;
--primary-hover:#1557b0;
--text:#202124;
--text-secondary:#5f6368;
--background:#ffffff;
--surface:#f8f9fa;
--border:#dadce0;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Roboto,system-ui;
background:var(--background);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

header{
width:100%;
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
position:absolute;
top:0;
z-index:10;
background:var(--background);
border-bottom:1px solid var(--border);
box-shadow:0 1px 6px rgba(0,0,0,.08);
}

.nav-left{display:flex;align-items:center;gap:20px}

.logo{
color:var(--primary);
text-decoration:none;
font-weight:700;
font-size:24px;
transition:all 0.2s ease;
}

.logo:hover{color:var(--primary-hover)}

.nav-links{display:flex;gap:12px;align-items:center}

.nav-links a{
text-decoration:none;
color:var(--text-secondary);
font-size:15px;
font-weight:500;
padding:8px 12px;
border-radius:8px;
transition:all 0.2s ease;
}

.nav-links a:hover{
color:var(--primary);
background:rgba(26,115,232,0.08);
}

/* MAIN */

.container{
margin-top:15vh;
width:100%;
max-width:800px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

.greeting{
font-size:36px;
margin-top:10vh;
}

.input-wrapper{
width:90%;
max-width:720px;
border:1px solid var(--border);
border-radius:24px;
padding:12px 24px;
margin-top:24px;
display:flex;
flex-direction:column;
}

input#query{
border:none;
outline:none;
font-size:16px;
padding:12px 0;
width:100%;
}

/* CHAT */

#chatArea{
width:100%;
max-width:800px;
display:none;
flex-direction:column;
gap:20px;
margin-top:80px;
padding:20px;
}

.message{font-size:16px}

.user-msg{
align-self:flex-end;
background:var(--surface);
padding:10px 14px;
border-radius:16px;
}

.bot-msg{
align-self:flex-start;
}

</style>

</head>

<body>

<header>
<div class="nav-left">
<a class="logo" href="#">VASUKI LABS</a>
<div class="nav-links">
<a href="#">Home</a>
<a href="#">Tools</a>
<a href="#">About</a>
</div>
</div>
</header>

<div class="container" id="homeUI">

<div class="greeting">
Welcome to Vasuki AI
</div>

<div class="input-wrapper">
<input type="text" id="query" placeholder="Ask for code help..." autocomplete="off">
</div>

</div>

<div id="chatArea"></div>

<!-- ✅ EXTERNAL JS FILE -->
<script type="module" src="script.js"></script>

</body>
</html>
