<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🔢 Numbers | Vasuki Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#1a73e8;
--surface:#202124;
--on-surface:#e8eaed;
--on-surface-variant:#9aa0a6;
--bg-main:#202124;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Roboto',system-ui;
background:var(--bg-main);
color:var(--on-surface);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:2rem 1rem;
}

/* MAIN CARD */
.shell{
width:100%;
max-width:500px;
border-radius:16px;
border:1px solid #3c4043;
background:#18181b;
padding:1.5rem;
}

h1{font-size:1.35rem;}
p{font-size:0.9rem;color:var(--on-surface-variant);margin-bottom:1rem;}

textarea{
width:100%;
min-height:120px;
background:#202124;
border-radius:12px;
border:1px solid #3c4043;
padding:0.75rem;
color:var(--on-surface);
outline:none;
resize:vertical;
}

.row{display:flex;gap:0.5rem;margin-top:0.6rem;}

button{
background:var(--primary);
color:#fff;
border:none;
border-radius:999px;
padding:0.5rem 1rem;
font-size:0.8rem;
font-weight:600;
cursor:pointer;
}

button:hover{background:#1765cc;}

.result{
margin-top:0.8rem;
font-size:0.9rem;
color:var(--on-surface-variant);
}

/* DEVICE MODAL */
.device-modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.device-box{
background:#18181b;
border:1px solid #3c4043;
padding:20px;
border-radius:16px;
text-align:center;
width:300px;
}

.device-options{
display:flex;
gap:10px;
margin-top:15px;
}

.device-btn{
flex:1;
padding:10px;
background:#202124;
border-radius:10px;
cursor:pointer;
}

.device-btn:hover{
background:#2a2b2e;
}

/* PHONE MODE */
.phone-mode .shell{
max-width:320px;
font-size:14px;
}

</style>
</head>

<body>

<!-- DEVICE MODAL -->
<div id="deviceModal" class="device-modal">
  <div class="device-box">
    <h2>Select Your Mode</h2>
    <p style="color:#9aa0a6">Optimize UI for your device</p>

    <div class="device-options">
      <div class="device-btn" onclick="setMode('phone')">📱 Phone</div>
      <div class="device-btn" onclick="setMode('desktop')">💻 Desktop</div>
    </div>
  </div>
</div>

<!-- MAIN TOOL -->
<main class="shell">
<h1>🔢 Numbers</h1>
<p>Paste text to analyze numbers inside it.</p>

<textarea id="numbers-input" placeholder="Paste text with numbers..."></textarea>

<div class="row">
<button onclick="analyze()">Analyze</button>
<button onclick="copyResult()">Copy</button>
</div>

<div id="numbers-result" class="result"></div>
</main>

<script>

/* DEVICE MODE */
function setMode(mode){
localStorage.setItem("deviceMode",mode);
applyMode();
document.getElementById("deviceModal").style.display="none";
}

function applyMode(){
const mode=localStorage.getItem("deviceMode");
if(mode==="phone"){
document.body.classList.add("phone-mode");
}else{
document.body.classList.remove("phone-mode");
}
}

window.onload=function(){
applyMode();
if(!localStorage.getItem("deviceMode")){
document.getElementById("deviceModal").style.display="flex";
}else{
document.getElementById("deviceModal").style.display="none";
}
};

/* ANALYZE */
function analyze(){
const text=document.getElementById('numbers-input').value;
const out=document.getElementById('numbers-result');

const matches=text.match(/-?\d+(\.\d+)?/g)||[];

if(matches.length===0){
out.textContent='No numbers found.';
return;
}

const nums=matches.map(Number).filter(n=>!isNaN(n));

const sum=nums.reduce((a,b)=>a+b,0);
const min=Math.min(...nums);
const max=Math.max(...nums);
const avg=sum/nums.length;

out.textContent=`Count: ${nums.length} · Sum: ${sum} · Min: ${min} · Max: ${max} · Avg: ${avg.toFixed(3)}`;
}

/* COPY RESULT */
function copyResult(){
const text=document.getElementById("numbers-result").textContent;

navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
