<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Google Sans', system-ui, sans-serif; }
        
        .google-blue { color: #4285f4; }
        .google-button {
            background: #4285f4;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .google-button:hover {
            background: #3367d6;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
        }
        .card {
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
        }
        .speed-number {
            font-size: 6.5rem;
            font-weight: 600;
            line-height: 1;
            color: #202124;
        }
        .progress-circle {
            stroke: #4285f4;
            transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen flex items-center justify-center">
    <div class="max-w-lg w-full mx-auto px-6 py-12">
        <!-- Header -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-9 h-9 bg-[#4285f4] rounded-full flex items-center justify-center text-white text-2xl font-bold">S</div>
            <h1 class="text-4xl font-medium tracking-tighter text-[#202124]">Speed Test</h1>
        </div>

        <div id="card" class="card bg-white rounded-3xl p-10 border border-[#dadce0]">
            
            <!-- Results -->
            <div id="results" class="hidden text-center">
                <div class="relative mx-auto w-64 h-64 flex items-center justify-center">
                    <svg class="w-64 h-64 -rotate-90" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="92" fill="none" stroke="#f1f3f4" stroke-width="16"/>
                        <circle id="progress-circle" cx="100" cy="100" r="92" fill="none"
                                stroke="#4285f4" stroke-width="16"
                                stroke-dasharray="578" stroke-dashoffset="578"
                                stroke-linecap="round"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div id="main-speed" class="speed-number">0</div>
                        <div class="text-[#5f6368] text-xl -mt-3 font-medium">Mbps</div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-8 mt-8 text-center">
                    <div>
                        <div class="text-4xl font-medium text-[#202124]" id="ping-result">0</div>
                        <div class="text-sm text-[#5f6368] mt-1">Ping</div>
                        <div class="text-xs text-[#8a8d92]">ms</div>
                    </div>
                    <div>
                        <div class="text-4xl font-medium text-[#4285f4]" id="download-result">0.0</div>
                        <div class="text-sm text-[#5f6368] mt-1">Download</div>
                        <div class="text-xs text-[#8a8d92]">Mbps</div>
                    </div>
                    <div>
                        <div class="text-4xl font-medium text-[#4285f4]" id="upload-result">0.0</div>
                        <div class="text-sm text-[#5f6368] mt-1">Upload</div>
                        <div class="text-xs text-[#8a8d92]">Mbps</div>
                    </div>
                </div>

                <button onclick="startTest()" 
                        class="mt-12 w-full google-button text-white font-medium text-lg py-4 rounded-2xl flex items-center justify-center gap-3 hover:scale-[1.02]">
                    <i class="fa-solid fa-rotate"></i>
                    TEST AGAIN
                </button>
            </div>

            <!-- Start Screen -->
            <div id="start-screen" class="text-center">
                <div class="mb-12">
                    <div onclick="startTest()" 
                         class="google-button mx-auto w-52 h-52 rounded-full flex items-center justify-center cursor-pointer hover:scale-105 active:scale-95 shadow-xl transition-all">
                        <div class="text-center">
                            <i class="fa-solid fa-play text-8xl text-white"></i>
                            <div class="mt-6 text-3xl font-medium text-white tracking-wider">GO</div>
                        </div>
                    </div>
                </div>
                <p class="text-[#5f6368] text-xl font-medium">Test your internet speed</p>
                <p class="text-[#8a8d92] mt-1">Powered by real-time measurements</p>
            </div>

            <!-- Testing Screen -->
            <div id="testing-screen" class="hidden space-y-10">
                <div class="flex items-center gap-5">
                    <div class="w-9 h-9 bg-[#f1f3f4] rounded-2xl flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-bolt text-[#fbbc05] text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between mb-2 text-sm">
                            <span class="font-medium text-[#202124]">Ping</span>
                            <span id="ping-value" class="font-mono text-[#5f6368]">— ms</span>
                        </div>
                        <div class="h-2 bg-[#f1f3f4] rounded-full overflow-hidden">
                            <div id="ping-bar" class="h-full w-0 bg-[#fbbc05] transition-all duration-700"></div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-5">
                    <div class="w-9 h-9 bg-[#f1f3f4] rounded-2xl flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-download text-[#4285f4] text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between mb-2 text-sm">
                            <span class="font-medium text-[#202124]">Download</span>
                            <span id="download-value" class="font-mono text-[#5f6368]">— Mbps</span>
                        </div>
                        <div class="h-2 bg-[#f1f3f4] rounded-full overflow-hidden">
                            <div id="download-bar" class="h-full w-0 bg-[#4285f4] transition-all duration-700"></div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-5">
                    <div class="w-9 h-9 bg-[#f1f3f4] rounded-2xl flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-upload text-[#34a853] text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between mb-2 text-sm">
                            <span class="font-medium text-[#202124]">Upload</span>
                            <span id="upload-value" class="font-mono text-[#5f6368]">— Mbps</span>
                        </div>
                        <div class="h-2 bg-[#f1f3f4] rounded-full overflow-hidden">
                            <div id="upload-bar" class="h-full w-0 bg-[#34a853] transition-all duration-700"></div>
                        </div>
                    </div>
                </div>

                <div class="text-center pt-6">
                    <div class="inline-flex items-center gap-3 bg-[#f1f3f4] text-[#5f6368] text-sm font-medium px-6 py-2 rounded-3xl">
                        <div class="w-3 h-3 bg-[#4285f4] rounded-full animate-ping"></div>
                        Testing your connection…
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center text-[#8a8d92] text-xs mt-8">
            Clean Google-style design • Real measurements • No ads
        </div>
    </div>

    <script>
        let isTesting = false;

        async function measurePing() {
            const pings = [];
            const url = `https://jsonplaceholder.typicode.com/todos/1?nocache=${Date.now()}`;
            for (let i = 0; i < 5; i++) {
                const start = Date.now();
                try {
                    await fetch(url, { cache: 'no-store' });
                    pings.push(Date.now() - start);
                } catch(e) {}
                await new Promise(r => setTimeout(r, 80));
            }
            return Math.round(Math.min(...pings));
        }

        async function measureDownload() {
            const url = `https://upload.wikimedia.org/wikipedia/commons/3/3e/Tokyo_Sky_Tree_2012.JPG?nocache=${Date.now()}`;
            const start = Date.now();
            const res = await fetch(url, { cache: 'no-store' });
            const blob = await res.blob();
            const duration = (Date.now() - start) / 1000;
            return Math.round((blob.size * 8) / duration / 1024 / 1024 * 10) / 10;
        }

        async function measureUpload() {
            const size = 4 * 1024 * 1024;
            const data = new Uint8Array(size);
            crypto.getRandomValues(data);
            const start = Date.now();
            await fetch('https://httpbin.org/post', {
                method: 'POST',
                body: new Blob([data]),
            });
            const duration = (Date.now() - start) / 1000;
            return Math.round((size * 8) / duration / 1024 / 1024 * 10) / 10;
        }

        function animateValue(id, start, end, duration, suffix = '') {
            const element = document.getElementById(id);
            const range = end - start;
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                const value = Math.floor(start + range * progress);
                element.textContent = value + suffix;
                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    element.textContent = end + suffix;
                }
            }
            requestAnimationFrame(step);
        }

        async function startTest() {
            if (isTesting) return;
            isTesting = true;

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            const testing = document.getElementById('testing-screen');
            testing.classList.remove('hidden');

            // Reset
            document.getElementById('ping-bar').style.width = '0%';
            document.getElementById('download-bar').style.width = '0%';
            document.getElementById('upload-bar').style.width = '0%';

            // Ping
            document.getElementById('ping-value').textContent = '— ms';
            const ping = await measurePing();
            document.getElementById('ping-bar').style.width = '100%';
            document.getElementById('ping-value').textContent = ping + ' ms';
            await new Promise(r => setTimeout(r, 400));

            // Download
            const download = await measureDownload();
            document.getElementById('download-bar').style.width = '100%';
            document.getElementById('download-value').textContent = download + ' Mbps';
            await new Promise(r => setTimeout(r, 400));

            // Upload
            const upload = await measureUpload();
            document.getElementById('upload-bar').style.width = '100%';
            document.getElementById('upload-value').textContent = upload + ' Mbps';

            // Show results
            setTimeout(() => {
                testing.classList.add('hidden');
                const resultsScreen = document.getElementById('results');
                resultsScreen.classList.remove('hidden');

                // Progress circle
                const offset = 578 - (578 * Math.min(download / 800, 1)); // max 800 Mbps for visual
                document.getElementById('progress-circle').style.strokeDashoffset = offset;

                animateValue('main-speed', 0, download, 1400);
                animateValue('ping-result', 0, ping, 800);
                animateValue('download-result', 0, download, 1100);
                animateValue('upload-result', 0, upload, 1100);

                isTesting = false;
            }, 600);
        }

        // Keyboard support
        document.addEventListener('keydown', e => {
            if ((e.key === 'Enter' || e.key === ' ') && !isTesting) startTest();
        });
    </script>
</body>
</html>
