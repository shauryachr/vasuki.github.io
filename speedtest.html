<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>|| वासुकी प्रयोगशाला || SpeedTest</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <style>
        :root {
            --primary: #b76e79; /* Rose Gold */
            --primary-light: #f1d5cf;
            --primary-dark: #8f5a62;
            --surface: #ffffff;
            --background: #fdf8f8;
            --text-primary: #3c4043; /* Google Gray */
            --text-secondary: #5f6368;
            --border: #dadce0;
            --elevation-1: 0 1px 2px 0 rgba(60,64,67,0.302), 0 1px 3px 1px rgba(60,64,67,0.149);
            --elevation-2: 0 4px 4px 0 rgba(60,64,67,0.302), 0 8px 12px 6px rgba(60,64,67,0.149);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Noto Sans Devanagari', 'Roboto', sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 400;
            color: var(--primary-dark);
            letter-spacing: 0.5px;
        }

        .container {
            background: var(--surface);
            width: 90%;
            max-width: 480px;
            padding: 40px;
            border-radius: 28px;
            box-shadow: var(--elevation-1);
            text-align: center;
            transition: box-shadow 0.3s ease;
            border: 1px solid var(--border);
        }

        .container:hover {
            box-shadow: var(--elevation-2);
        }

        .speed-gauge {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid var(--primary-light);
            border-radius: 50%;
            transition: border-color 0.5s ease;
        }

        .speed-gauge.testing {
            border-color: var(--primary);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .speed-value {
            font-size: 48px;
            font-weight: 500;
            color: var(--primary-dark);
        }

        .speed-unit {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: -4px;
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 16px 8px;
            border-radius: 16px;
            background: var(--background);
            border: 1px solid var(--border);
        }

        .stat-icon {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .start-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.302), 0 4px 8px 3px rgba(60,64,67,0.149);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .start-btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 2px 3px 0 rgba(60,64,67,0.302), 0 6px 10px 4px rgba(60,64,67,0.149);
            transform: translateY(-1px);
        }

        .start-btn:active {
            transform: translateY(0);
            box-shadow: var(--elevation-1);
        }

        .start-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>वासुकी प्रयोगशाला <span>SpeedTest</span></h1>
    </div>

    <div class="container">
        <div class="speed-gauge" id="gauge">
            <div>
                <span class="speed-value" id="speed">0</span>
                <span class="speed-unit">Mbps</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="material-icons-outlined stat-icon">network_ping</span>
                <span class="stat-label">Ping</span>
                <span class="stat-value" id="ping">--</span>
            </div>
            <div class="stat-card">
                <span class="material-icons-outlined stat-icon">download</span>
                <span class="stat-label">Download</span>
                <span class="stat-value" id="download">--</span>
            </div>
            <div class="stat-card">
                <span class="material-icons-outlined stat-icon">upload</span>
                <span class="stat-label">Upload</span>
                <span class="stat-value" id="upload">--</span>
            </div>
        </div>

        <button class="start-btn" id="startBtn" onclick="startTest()">
            <span class="material-icons-outlined">play_arrow</span>
            Start Test
        </button>
    </div>

    <div class="footer">
        © 2026 वासुकी प्रयोगशाला • Powered by <a href="https://vasuki.cloud" target="_blank">vasuki.cloud</a>
    </div>

    <script>
        const speedEl = document.getElementById("speed");
        const pingEl = document.getElementById("ping");
        const downloadEl = document.getElementById("download");
        const uploadEl = document.getElementById("upload");
        const startBtn = document.getElementById("startBtn");
        const gauge = document.getElementById("gauge");

        async function testPing() {
            const start = performance.now();
            try {
                await fetch("https://www.google.com", { mode: "no-cors", cache: "no-store" });
                const end = performance.now();
                return (end - start).toFixed(0);
            } catch (e) {
                return "--";
            }
        }

        async function testDownload() {
            // Using a slightly smaller file or chunking might be better for UI responsiveness,
            // but keeping the user's logic for now.
            const fileUrl = "https://speed.hetzner.de/100MB.bin?cb=" + Date.now();
            const start = performance.now();
            try {
                const response = await fetch(fileUrl);
                const reader = response.body.getReader();
                let received = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    received += value.length;
                    
                    // Update UI periodically during download
                    const currentEnd = performance.now();
                    const duration = (currentEnd - start) / 1000;
                    if (duration > 0) {
                        const currentSpeed = (received * 8 / duration / 1024 / 1024).toFixed(1);
                        speedEl.innerText = currentSpeed;
                    }
                    
                    // Limit test duration to 10 seconds for UX
                    if (performance.now() - start > 10000) {
                        reader.cancel();
                        break;
                    }
                }

                const end = performance.now();
                const duration = (end - start) / 1000;
                const bitsLoaded = received * 8;
                const speedMbps = (bitsLoaded / duration / 1024 / 1024).toFixed(1);
                return speedMbps;
            } catch (e) {
                return "0.0";
            }
        }

        async function testUpload() {
            const dataSize = 10 * 1024 * 1024; // 10MB for upload test
            const data = new Blob([new Uint8Array(dataSize)]);
            const start = performance.now();
            try {
                await fetch("https://httpbin.org/post", {
                    method: "POST",
                    body: data,
                    cache: "no-store"
                });
                const end = performance.now();
                const duration = (end - start) / 1000;
                const bitsLoaded = dataSize * 8;
                const speedMbps = (bitsLoaded / duration / 1024 / 1024).toFixed(1);
                return speedMbps;
            } catch (e) {
                return "0.0";
            }
        }

        async function startTest() {
            // UI State: Testing
            startBtn.disabled = true;
            startBtn.innerHTML = `<span class="material-icons-outlined">hourglass_empty</span> Testing...`;
            gauge.classList.add("testing");
            
            speedEl.innerText = "0";
            pingEl.innerText = "--";
            downloadEl.innerText = "--";
            uploadEl.innerText = "--";

            // Ping Test
            const ping = await testPing();
            pingEl.innerText = ping + " ms";

            // Download Test
            const download = await testDownload();
            downloadEl.innerText = download + " Mbps";
            speedEl.innerText = download;

            // Upload Test
            // Temporarily set gauge to 0 to show upload speed progress if we had it, 
            // otherwise just show final
            const upload = await testUpload();
            uploadEl.innerText = upload + " Mbps";
            
            // UI State: Done
            startBtn.disabled = false;
            startBtn.innerHTML = `<span class="material-icons-outlined">play_arrow</span> Start Test`;
            gauge.classList.remove("testing");
        }
    </script>

</body>
</html>
