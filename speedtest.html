<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest • by Grok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gauge {
            background: conic-gradient(#22c55e 0deg 0deg, #eab308 0deg 180deg, #ef4444 180deg 360deg);
        }
        .speed-number {
            font-size: 5rem;
            line-height: 1;
        }
        .stage {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-auto p-6">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tighter mb-2">SpeedTest</h1>
            <p class="text-zinc-400">Real-time internet speed test</p>
        </div>

        <!-- Main Card -->
        <div id="card" class="bg-zinc-900 rounded-3xl shadow-2xl border border-zinc-800 p-8">
            <!-- Results -->
            <div id="results" class="hidden">
                <div class="flex justify-center mb-8">
                    <div class="relative w-48 h-48">
                        <svg class="w-48 h-48 -rotate-90" viewBox="0 0 200 200">
                            <circle cx="100" cy="100" r="90" fill="none" stroke="#27272a" stroke-width="20"/>
                            <circle id="progress-circle" cx="100" cy="100" r="90" fill="none" 
                                    stroke="#22c55e" stroke-width="20" stroke-dasharray="565" 
                                    stroke-dashoffset="565" stroke-linecap="round"/>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <div id="main-speed" class="speed-number font-bold text-white">0</div>
                            <div class="text-sm text-zinc-400 -mt-3">Mbps</div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <div class="text-emerald-400 text-2xl font-semibold" id="ping-result">0</div>
                        <div class="text-xs text-zinc-400">PING</div>
                        <div class="text-[10px] text-zinc-500">ms</div>
                    </div>
                    <div>
                        <div class="text-emerald-400 text-2xl font-semibold" id="download-result">0.0</div>
                        <div class="text-xs text-zinc-400">DOWNLOAD</div>
                        <div class="text-[10px] text-zinc-500">Mbps</div>
                    </div>
                    <div>
                        <div class="text-emerald-400 text-2xl font-semibold" id="upload-result">0.0</div>
                        <div class="text-xs text-zinc-400">UPLOAD</div>
                        <div class="text-[10px] text-zinc-500">Mbps</div>
                    </div>
                </div>

                <button onclick="startTest()" 
                        class="mt-10 w-full bg-white text-zinc-900 hover:bg-zinc-200 font-semibold py-4 rounded-2xl text-lg transition-all active:scale-95">
                    TEST AGAIN
                </button>
            </div>

            <!-- Start Screen -->
            <div id="start-screen">
                <div class="flex justify-center mb-8">
                    <div onclick="startTest()" 
                         class="w-48 h-48 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-400 flex items-center justify-center cursor-pointer hover:scale-105 active:scale-95 transition-all shadow-xl shadow-emerald-500/30">
                        <div class="text-center">
                            <i class="fa-solid fa-play text-7xl text-zinc-900 mb-2"></i>
                            <div class="text-2xl font-bold text-zinc-900 tracking-tighter">GO</div>
                        </div>
                    </div>
                </div>
                <p class="text-center text-zinc-400 text-sm">Click GO to test your internet speed</p>
            </div>

            <!-- Testing Screen -->
            <div id="testing-screen" class="hidden">
                <div class="space-y-8">
                    <!-- Ping -->
                    <div id="stage-ping" class="stage flex items-center gap-4">
                        <div class="w-10 h-10 bg-zinc-800 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-bolt text-yellow-400"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between text-sm mb-1">
                                <span class="font-medium">Ping</span>
                                <span id="ping-value" class="font-mono">— ms</span>
                            </div>
                            <div class="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                                <div id="ping-bar" class="h-full w-0 bg-yellow-400 transition-all duration-700"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Download -->
                    <div id="stage-download" class="stage flex items-center gap-4 opacity-40">
                        <div class="w-10 h-10 bg-zinc-800 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-download text-emerald-400"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between text-sm mb-1">
                                <span class="font-medium">Download</span>
                                <span id="download-value" class="font-mono">— Mbps</span>
                            </div>
                            <div class="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                                <div id="download-bar" class="h-full w-0 bg-emerald-400 transition-all duration-700"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Upload -->
                    <div id="stage-upload" class="stage flex items-center gap-4 opacity-40">
                        <div class="w-10 h-10 bg-zinc-800 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-upload text-sky-400"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between text-sm mb-1">
                                <span class="font-medium">Upload</span>
                                <span id="upload-value" class="font-mono">— Mbps</span>
                            </div>
                            <div class="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                                <div id="upload-bar" class="h-full w-0 bg-sky-400 transition-all duration-700"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-12">
                    <div class="inline-flex items-center gap-2 text-zinc-500 text-sm">
                        <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                        Testing your connection...
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-8 text-xs text-zinc-500">
            Made with ❤️ using pure HTML • CSS • JS<br>
            Uses public endpoints (no data stored)
        </div>
    </div>

    <script>
        // Tailwind script already loaded via CDN
        function tailwindInit() {
            // Already ready
        }

        let isTesting = false;

        async function measurePing() {
            const pings = [];
            const url = `https://jsonplaceholder.typicode.com/todos/1?nocache=${Date.now()}`;
            
            for (let i = 0; i < 6; i++) {
                const start = Date.now();
                try {
                    await fetch(url, { cache: 'no-store', mode: 'cors' });
                    pings.push(Date.now() - start);
                } catch (e) {}
                await new Promise(r => setTimeout(r, 100));
            }
            return Math.min(...pings); // best ping
        }

        async function measureDownload() {
            // Large public image (\~8 MB) from Wikimedia (CORS enabled)
            const url = `https://upload.wikimedia.org/wikipedia/commons/3/3e/Tokyo_Sky_Tree_2012.JPG?nocache=${Date.now()}`;
            const start = Date.now();
            
            const response = await fetch(url, { cache: 'no-store', mode: 'cors' });
            const blob = await response.blob();
            const duration = (Date.now() - start) / 1000;
            
            const bits = blob.size * 8;
            const Mbps = (bits / duration / 1024 / 1024).toFixed(1);
            return parseFloat(Mbps);
        }

        async function measureUpload() {
            // 4 MB random data
            const size = 4 * 1024 * 1024;
            const data = new Uint8Array(size);
            crypto.getRandomValues(data);
            const blob = new Blob([data]);
            
            const start = Date.now();
            await fetch('https://httpbin.org/post', {
                method: 'POST',
                body: blob,
                headers: { 'Content-Type': 'application/octet-stream' }
            });
            const duration = (Date.now() - start) / 1000;
            
            const bits = size * 8;
            const Mbps = (bits / duration / 1024 / 1024).toFixed(1);
            return parseFloat(Mbps);
        }

        function animateValue(id, start, end, duration, suffix = '') {
            const obj = document.getElementById(id);
            const range = end - start;
            const startTime = Date.now();
            
            function update() {
                const now = Date.now();
                const elapsed = now - startTime;
                let progress = elapsed / duration;
                if (progress > 1) progress = 1;
                
                const value = Math.floor(start + range * progress);
                obj.textContent = value + suffix;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    obj.textContent = end + suffix;
                }
            }
            update();
        }

        async function startTest() {
            if (isTesting) return;
            isTesting = true;

            const startScreen = document.getElementById('start-screen');
            const testingScreen = document.getElementById('testing-screen');
            const resultsScreen = document.getElementById('results');

            startScreen.classList.add('hidden');
            testingScreen.classList.remove('hidden');
            resultsScreen.classList.add('hidden');

            // Reset bars
            document.getElementById('ping-bar').style.width = '0%';
            document.getElementById('download-bar').style.width = '0%';
            document.getElementById('upload-bar').style.width = '0%';

            // STAGE 1: Ping
            document.getElementById('stage-ping').classList.remove('opacity-40');
            const ping = await measurePing();
            document.getElementById('ping-bar').style.width = '100%';
            document.getElementById('ping-value').textContent = ping + ' ms';
            await new Promise(r => setTimeout(r, 600));

            // STAGE 2: Download
            document.getElementById('stage-download').classList.remove('opacity-40');
            const download = await measureDownload();
            document.getElementById('download-bar').style.width = '100%';
            document.getElementById('download-value').textContent = download + ' Mbps';
            await new Promise(r => setTimeout(r, 600));

            // STAGE 3: Upload
            document.getElementById('stage-upload').classList.remove('opacity-40');
            const upload = await measureUpload();
            document.getElementById('upload-bar').style.width = '100%';
            document.getElementById('upload-value').textContent = upload + ' Mbps';

            // Show results
            setTimeout(() => {
                testingScreen.classList.add('hidden');
                resultsScreen.classList.remove('hidden');

                // Animate results
                animateValue('ping-result', 0, ping, 800);
                animateValue('download-result', 0, download, 1200);
                animateValue('upload-result', 0, upload, 1200);

                // Main speed = download (most important)
                animateValue('main-speed', 0, download, 1500);

                isTesting = false;
            }, 800);
        }

        // Keyboard support: Press Enter or Space to start
        document.addEventListener('keydown', e => {
            if ((e.key === 'Enter' || e.key === ' ') && !isTesting) {
                startTest();
            }
        });

        // Auto-run once loaded (optional)
        // window.onload = () => setTimeout(startTest, 600);
    </script>
</body>
</html>
