<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vasuki SpeedTest Beta</title>
<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}
.container{
    width:400px;
}
h1{
    font-weight:300;
}
span{
    color:#38bdf8;
}
.speed{
    font-size:48px;
    margin:20px 0;
}
.stats{
    display:flex;
    justify-content:space-between;
    margin:20px 0;
}
button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#38bdf8;
    color:black;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:white;
}
</style>
</head>
<body>

<div class="container">
    <h1>Vasuki SpeedTest <span>Beta</span></h1>
    <div class="speed" id="speed">0 Mbps</div>

    <div class="stats">
        <div>Ping: <span id="ping">--</span></div>
        <div>Download: <span id="download">--</span></div>
        <div>Upload: <span id="upload">--</span></div>
    </div>

    <button onclick="startTest()">Start Test</button>
</div>

<script>

async function testPing() {
    const start = performance.now();
    await fetch("https://www.google.com", {mode:"no-cors"});
    const end = performance.now();
    return (end - start).toFixed(2);
}

async function testDownload() {
    const fileUrl = "https://speed.hetzner.de/100MB.bin";
    const start = performance.now();
    const response = await fetch(fileUrl);
    const reader = response.body.getReader();
    let received = 0;

    while(true){
        const {done, value} = await reader.read();
        if(done) break;
        received += value.length;
    }

    const end = performance.now();
    const duration = (end - start) / 1000;
    const bitsLoaded = received * 8;
    const speedMbps = (bitsLoaded / duration / 1024 / 1024).toFixed(2);
    return speedMbps;
}

async function testUpload() {
    const data = new Blob([new Uint8Array(20 * 1024 * 1024)]);
    const start = performance.now();
    await fetch("https://httpbin.org/post", {
        method:"POST",
        body:data
    });
    const end = performance.now();
    const duration = (end - start) / 1000;
    const bitsLoaded = data.size * 8;
    const speedMbps = (bitsLoaded / duration / 1024 / 1024).toFixed(2);
    return speedMbps;
}

async function startTest(){

    document.getElementById("speed").innerText="Testing...";
    document.getElementById("ping").innerText="--";
    document.getElementById("download").innerText="--";
    document.getElementById("upload").innerText="--";

    const ping = await testPing();
    document.getElementById("ping").innerText = ping + " ms";

    const download = await testDownload();
    document.getElementById("download").innerText = download + " Mbps";
    document.getElementById("speed").innerText = download + " Mbps";

    const upload = await testUpload();
    document.getElementById("upload").innerText = upload + " Mbps";
}

</script>

</body>
</html>
