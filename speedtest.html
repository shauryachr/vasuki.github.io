<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Speed Test - Vasuki</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#1a73e8;
--primary-hover:#1557b0;
--background:#ffffff;
--surface:#f8f9fa;
--text:#202124;
--muted:#5f6368;
--border:#dadce0;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Roboto;
background:var(--background);
color:var(--text);
}

/* NAV */
header{
border-bottom:1px solid var(--border);
}

nav{
display:flex;
justify-content:space-between;
max-width:1100px;
margin:auto;
padding:16px;
}

.logo{
color:var(--primary);
font-weight:700;
font-size:24px;
text-decoration:none;
}

.nav-links{
display:flex;
gap:18px;
}

.nav-links a{
color:var(--muted);
text-decoration:none;
padding:8px;
}

.nav-links a:hover{
color:var(--primary);
}

/* MAIN */
main{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:var(--surface);
border:1px solid var(--border);
padding:30px;
border-radius:12px;
}

.card h2{
margin-bottom:20px;
}

/* METRICS */
.metrics{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:20px;
}

.metric{
background:white;
border:1px solid var(--border);
border-radius:10px;
padding:20px;
text-align:center;
}

.value{
font-size:28px;
font-weight:700;
}

/* BUTTON */
button{
padding:12px 20px;
background:var(--primary);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:var(--primary-hover);
}

</style>

</head>

<body>

<header>
<nav>
<a class="logo">VASUKI</a>

<div class="nav-links">
<a href="#">AI</a>
<a href="#">Wiki</a>
<a href="#">Speed</a>
</div>
</nav>
</header>

<main>

<div class="card">

<h2>🚀 Real Speed Test (LibreSpeed)</h2>

<div class="metrics">

<div class="metric">
<div>⬇️ Download</div>
<div class="value" id="dl">0</div>
</div>

<div class="metric">
<div>⬆️ Upload</div>
<div class="value" id="ul">0</div>
</div>

<div class="metric">
<div>🏓 Ping</div>
<div class="value" id="ping">0</div>
</div>

<div class="metric">
<div>📊 Jitter</div>
<div class="value" id="jit">0</div>
</div>

</div>

<button onclick="startTest()">Start Real Test</button>

</div>

</main>

<!-- LIBRESPEED -->
<script src="https://cdn.jsdelivr.net/gh/librespeed/speedtest/speedtest.js"></script>

<script>

let s = new Speedtest();

// Update live data
s.onupdate = function(data){
document.getElementById('dl').textContent = data.dlStatus || 0;
document.getElementById('ul').textContent = data.ulStatus || 0;
document.getElementById('ping').textContent = data.pingStatus || 0;
document.getElementById('jit').textContent = data.jitterStatus || 0;
};

// Start test
function startTest(){
s.start();
}

</script>

</body>
</html>
