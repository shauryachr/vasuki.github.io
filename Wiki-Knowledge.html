<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wiki Knowledge - Vasuki Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #ffca28; 
  --text: #333333;
  --bg-light: #e0e0e0;
  --glass-fill: rgba(255, 255, 255, 0.45);
  --glass-stroke: rgba(255, 255, 255, 0.6);
}

* { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

body {
  font-family: 'SF Pro Display', sans-serif;
  background: var(--bg-light);
  background-image: radial-gradient(at 0% 0%, #f9f9f9 0, transparent 50%), 
                    radial-gradient(at 100% 100%, #cfcfcf 0, transparent 50%);
  color: var(--text);
  min-height: 100vh;
}

header {
  position: sticky;
  top: 15px;
  margin: 0 20px;
  z-index: 1000;
  background: var(--glass-fill);
  backdrop-filter: blur(25px) saturate(160%);
  -webkit-backdrop-filter: blur(25px) saturate(160%);
  border: 1px solid var(--glass-stroke);
  border-radius: 24px;
  animation: liquidFloat 6s ease-in-out infinite;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1100px;
  margin: auto;
  padding: 14px 28px;
}

.logo {
  color: #b8860b;
  text-decoration: none;
  font-weight: 600;
  font-size: 20px;
  letter-spacing: -0.5px;
}

.nav-links { display: flex; gap: 20px; }
.nav-links a { 
  text-decoration: none; 
  color: rgba(0,0,0,0.6); 
  font-size: 13px; 
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 12px;
  transition: 0.3s;
}

.nav-links a:hover {
  background: rgba(255, 255, 255, 0.3);
  color: #000;
}

main {
  max-width: 850px;
  margin: auto;
  padding: 80px 20px;
}

.card {
  background: var(--glass-fill);
  backdrop-filter: blur(35px);
  -webkit-backdrop-filter: blur(35px);
  border-radius: 32px;
  padding: 45px;
  border: 1px solid var(--glass-stroke);
  box-shadow: 0 30px 60px -12px rgba(0,0,0,0.08);
}

h2 { font-weight: 600; text-align: center; margin-bottom: 30px; letter-spacing: -1px; }

#search {
  width: 100%;
  padding: 18px 25px;
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--glass-stroke);
  border-radius: 20px;
  font-size: 16px;
  outline: none;
  margin-bottom: 25px;
  color: #000;
  transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

#search:focus { background: #fff; border-color: var(--primary); box-shadow: 0 0 0 5px rgba(255,202,40,0.15); }

button {
  width: 100%;
  padding: 18px;
  background: var(--primary);
  color: #5d4037;
  border: none;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  animation: liquidFloat 5s ease-in-out infinite;
  box-shadow: 0 10px 25px rgba(255, 202, 40, 0.25);
  transition: 0.3s;
}

button:hover {
    filter: brightness(1.05);
}

#result {
  margin-top: 40px;
  padding: 30px;
  border-radius: 24px;
  background: rgba(255,255,255,0.25);
  border: 1px solid var(--glass-stroke);
  line-height: 1.8;
  font-size: 15px;
  min-height: 100px;
}

#result h3 { color: #b8860b; margin-bottom: 15px; font-size: 22px; }

@keyframes liquidFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

footer { text-align: center; padding: 50px; opacity: 0.4; font-size: 11px; letter-spacing: 2px; }
</style>
</head>

<body>
<header>
<nav>
<a class="logo" href="index.html">VASUKI INTELLIGENCE</a>
<div class="nav-links">
<a href="General-AI.html">AI</a>
</div>
</nav>
</header>

<main>
<div class="card">
<h2>KNOWLEDGE EXPLORER</h2>
<input id="search" type="text" placeholder="Enter topic for 150-word summary..." autocomplete="off">
<button onclick="wiki()">GENERATE SUMMARY</button>
<div id="result"><p style="text-align:center; opacity:0.5;">Awaiting your request.</p></div>
</div>
</main>

<footer>VASUKI RESEARCH PLATFORM • 2026</footer>

<script>
async function wiki(){
  const q = document.getElementById('search').value.trim();
  const resDiv = document.getElementById('result');
  if(!q) return;

  resDiv.innerHTML = `<p style="text-align:center;">Analyzing and summarizing...</p>`;

  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
    const data = await res.json();
    
    let text = data.extract || "No data found for this topic.";
    
    // Strict 150-word limit processing
    let words = text.split(/\s+/);
    if(words.length > 150) {
      text = words.slice(0, 150).join(" ") + "...";
    }

    resDiv.innerHTML = `<h3>${data.title}</h3><p>${text}</p>`;
  } catch(e) {
    resDiv.innerHTML = `<p style="text-align:center; color:red;">Connection error. Please check your network.</p>`;
  }
}
</script>
</body>
</html>
