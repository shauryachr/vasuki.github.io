<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vasuki AI - Image Generator</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&display=swap">
  <style>
    :root {
      --primary: #1a73e8;
      --primary-hover: #0d65d6;
      --surface: #ffffff;
      --bg: #f8f9fa;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --border: #dadce0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.12);
      --radius: 12px;
    }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      margin: 0;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    header {
      padding: 24px 32px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--primary);
      margin: 0 0 4px;
    }
    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }
    main {
      padding: 32px 32px 24px;
    }
    label {
      font-size: 14px;
      font-weight: 500;
      display: block;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      resize: vertical;
      background: white;
      transition: border 0.15s, box-shadow 0.15s;
    }
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
      outline: none;
    }
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--primary-hover); }
    .btn:disabled { background: #bdc1c6; cursor: not-allowed; }
    #loading {
      display: none;
      text-align: center;
      margin: 24px 0;
      color: var(--text-secondary);
      font-size: 15px;
    }
    #result {
      text-align: center;
      margin-top: 16px;
    }
    #generatedImg {
      max-width: 100%;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      display: none;
    }
    .error, .info {
      font-size: 14px;
      margin-top: 12px;
    }
    .error { color: #d93025; }
    .info { color: #ea8600; }
    footer {
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Vasuki AI</h1>
      <div class="subtitle">Generate images using your Vasuki Space (fallback enabled)</div>
    </header>

    <main>
      <label for="prompt">Describe your image</label>
      <textarea id="prompt" placeholder="A divine serpent Vasuki coiled around a mystical mountain at golden hour, intricate scales glowing, epic fantasy style, ultra-detailed, cinematic lighting"></textarea>

      <button class="btn" id="generateBtn">Generate</button>

      <div id="loading">Creating your image... (may take 10–60 seconds)</div>
      <div id="result">
        <img id="generatedImg" alt="Generated by Vasuki AI" />
        <div id="status" class="info"></div>
        <div id="error" class="error"></div>
      </div>
    </main>

    <footer>
      Primary: https://adamyakhairwal2011-vasuki-ai.hf.space • Google Flat Theme • Fallback: Pollinations Flux
    </footer>
  </div>

  <script>
    const promptEl = document.getElementById('prompt');
    const btn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const imgEl = document.getElementById('generatedImg');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    btn.addEventListener('click', async () => {
      const prompt = promptEl.value.trim();
      if (!prompt) {
        errorEl.textContent = 'Please enter a description.';
        return;
      }

      errorEl.textContent = '';
      statusEl.textContent = '';
      btn.disabled = true;
      loading.style.display = 'block';
      imgEl.style.display = 'none';
      imgEl.src = '';

      try {
        // ── Primary: Try YOUR Vasuki Hugging Face Space API ──
        const vasukiUrl = 'https://adamyakhairwal2011-vasuki-ai.hf.space/api/predict/';
        const payload = {
          data: [prompt, "image"]  // Adjust this array based on actual inputs (e.g. [prompt, mode="image", width, height...])
          // If needed, add: session_hash: some_hash, fn_index: 0
        };

        const vasukiRes = await fetch(vasukiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (vasukiRes.ok) {
          const json = await vasukiRes.json();
          // Typical Gradio image output: json.data[0] is either base64 string or URL
          let imageSrc = json.data?.[0];
          if (imageSrc && typeof imageSrc === 'string') {
            if (!imageSrc.startsWith('http') && !imageSrc.startsWith('data:')) {
              imageSrc = 'data:image/png;base64,' + imageSrc;  // assume base64 if not URL
            }
            imgEl.src = imageSrc;
            statusEl.textContent = 'Generated via Vasuki Space!';
            await new Promise(r => { imgEl.onload = r; });
            imgEl.style.display = 'block';
            loading.style.display = 'none';
            btn.disabled = false;
            return;  // Success → stop here
          }
        }

        // If Vasuki fails (503, wrong payload, no image, etc.) → fallback
        throw new Error('Vasuki API not responding or no image returned');

      } catch (err) {
        // Fallback to reliable free Flux endpoint
        statusEl.textContent = 'Vasuki Space unavailable (likely sleeping) — using fallback Flux model';
        errorEl.textContent = '';  // clear previous

        const fallbackUrl = `https://image.pollinations.ai/prompt/\( {encodeURIComponent(prompt)}?width=1152&height=896&model=flux&enhance=true&nologo=true& \){Date.now()}`;

        imgEl.src = fallbackUrl;
        imgEl.onload = () => {
          loading.style.display = 'none';
          imgEl.style.display = 'block';
          btn.disabled = false;
        };
        imgEl.onerror = () => {
          loading.style.display = 'none';
          errorEl.textContent = 'Fallback also failed — try again later or simplify prompt.';
          btn.disabled = false;
        };
      }
    });
  </script>
</body>
</html>
