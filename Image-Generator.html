<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasuki Image Generator</title>

<style>
:root {
    --bg: #ffffff;
    --card: #f5f5f7;
    --text: #111;
    --primary: #1a73e8;
    --border: #e0e0e0;
}

body.dark {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #ffffff;
    --primary: #4c8bf5;
    --border: #2a2a2a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Google Sans", Arial, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.3s ease;
}

.container {
    width: 95%;
    max-width: 700px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

h1 {
    font-size: 22px;
    font-weight: 500;
}

.toggle {
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid var(--border);
}

.input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
}

button {
    padding: 12px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: var(--primary);
    color: white;
    font-weight: 500;
}

button:hover {
    opacity: 0.9;
}

.image-box {
    margin-top: 15px;
    text-align: center;
}

img {
    max-width: 100%;
    border-radius: 12px;
    margin-top: 10px;
    display: none;
}

.download-btn {
    margin-top: 10px;
    display: none;
}

.loading {
    font-size: 14px;
    margin-top: 10px;
    display: none;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Vasuki Image Generator</h1>
        <button class="toggle" onclick="toggleTheme()">Dark Mode</button>
    </div>

    <div class="card">
        <div class="input-area">
            <input type="text" id="prompt" placeholder="Describe the image you want...">
            <button onclick="generateImage()">Generate</button>
        </div>

        <div class="loading" id="loading">Generating image...</div>

        <div class="image-box">
            <img id="resultImage">
            <br>
            <button class="download-btn" id="downloadBtn" onclick="downloadImage()">Download Image</button>
        </div>
    </div>
</div>

<script>
const API_KEY = "622c9612-d085-4235-827a-9e185b3eb920";
let currentImageURL = "";

function toggleTheme() {
    document.body.classList.toggle("dark");
    const btn = document.querySelector(".toggle");
    btn.textContent = document.body.classList.contains("dark") 
        ? "Light Mode" 
        : "Dark Mode";
}

async function generateImage() {

    const prompt = document.getElementById("prompt").value;
    const loading = document.getElementById("loading");
    const resultImage = document.getElementById("resultImage");
    const downloadBtn = document.getElementById("downloadBtn");

    if (!prompt) {
        alert("Enter a prompt first.");
        return;
    }

    loading.style.display = "block";
    resultImage.style.display = "none";
    downloadBtn.style.display = "none";

    try {
        const response = await fetch("https://api.samvya.ai/v1/generate-image", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                prompt: prompt,
                size: "1024x1024"
            })
        });

        const data = await response.json();

        if (data.image_url) {
            currentImageURL = data.image_url;
            resultImage.src = currentImageURL;
            resultImage.style.display = "block";
            downloadBtn.style.display = "inline-block";
        } else {
            alert("Image generation failed.");
        }

    } catch (error) {
        console.error(error);
        alert("Error generating image.");
    }

    loading.style.display = "none";
}

function downloadImage() {
    if (!currentImageURL) return;
    const a = document.createElement("a");
    a.href = currentImageURL;
    a.download = "vasuki-image.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>
