<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Picker</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--primary:#1a73e8;
--border:#dadce0;
--bg:#f1f3f4;
--text:#202124;
--card:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Roboto,system-ui;
background:var(--bg);
color:var(--text);
text-align:center;
padding:40px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:25px;
max-width:400px;
margin:auto;
}

h2{
margin-bottom:10px;
color:var(--primary);
}

p{
color:#5f6368;
margin-bottom:20px;
}

.row{
display:flex;
gap:10px;
margin-bottom:15px;
}

input[type="text"]{
flex:1;
padding:10px;
border:1px solid var(--border);
border-radius:6px;
}

input[type="color"]{
width:60px;
border:none;
background:none;
cursor:pointer;
}

.swatch{
height:100px;
border-radius:8px;
border:1px solid var(--border);
margin-bottom:10px;
}

.info{
font-size:14px;
color:#5f6368;
}

</style>

</head>

<body>

<div class="card">

<h2>Color Picker</h2>
<p>Pick a color or paste a hex value</p>

<div class="row">
<input id="hexInput" type="text" placeholder="#1a73e8">
<input id="picker" type="color" value="#1a73e8">
</div>

<div class="swatch" id="swatch"></div>
<div class="info" id="info"></div>

</div>

<script>

const hexInput=document.getElementById('hexInput');
const picker=document.getElementById('picker');
const swatch=document.getElementById('swatch');
const info=document.getElementById('info');

function setColor(hex){

if(!/^#?[0-9a-fA-F]{6}$/.test(hex)) return;

if(hex[0]!=='#') hex='#'+hex;

swatch.style.background=hex;
picker.value=hex;
hexInput.value=hex;
info.textContent="HEX: "+hex.toUpperCase();

}

picker.addEventListener('input',e=>setColor(e.target.value));
hexInput.addEventListener('input',()=>setColor(hexInput.value.trim()));

setColor('#1a73e8');

</script>

</body>
</html>
