<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vasuki Assistant</title>

  <!-- MathJax v3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" async></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>

  <!-- Prism with line-numbers -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <style>
    :root {
      --google-blue: #1a73e8;
      --google-red: #ea4335;
      --google-green: #34a853;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --bg: #fff;
      --surface: #fff;
      --border: #dadce0;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.9rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 1.2rem;
      color: var(--google-blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #mode-toggle button {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-left: 0.5rem;
      font-size: 0.9rem;
    }
    #mode-toggle button.active {
      background: var(--google-blue);
      color: white;
      border: none;
    }
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #sidebar {
      width: 200px;
      background: #f8f9fa;
      border-right: 1px solid var(--border);
      padding: 1.2rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    #messages {
      flex: 1;
      padding: 1.5rem 1.5rem 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .message {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      max-width: 90%;
    }
    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--google-blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .user .avatar { background: var(--google-green); }
    .bubble {
      padding: 1rem 1.3rem;
      border-radius: 6px;
      background: #f1f3f4;
      border: 1px solid var(--border);
      line-height: 1.5;
      font-size: 1rem;
      word-break: break-word;
    }
    .user .bubble {
      background: var(--google-blue);
      color: white;
      border: none;
    }
    pre {
      background: #f6f8fa;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.8rem 0;
      max-height: 600px;
      overflow-y: auto;
      position: relative;
    }
    pre.code-long {
      max-height: 800px;
    }
    code {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.95rem;
    }
    .copy-all-btn {
      margin-top: 0.6rem;
      background: var(--google-green);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    #input-container {
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.8rem;
      position: relative;
    }
    #prompt {
      flex: 1;
      padding: 0.8rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
      resize: vertical;
      min-height: 48px;
    }
    #send {
      background: var(--google-blue);
      color: white;
      border: none;
      padding: 0 1.4rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #stop-btn {
      background: var(--google-red);
      color: white;
      border: none;
      padding: 0 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      display: none;
    }
    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: var(--google-green);
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    Vasuki Assistant
    <div id="mode-toggle">
      <button class="active" id="ask-btn">Ask</button>
      <button id="research-btn">Research</button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar">
      <strong>Mode</strong><br>
      <small>Ask → general / code</small><br>
      <small>Research → deep topic</small>
    </div>

    <div id="messages">
      <!-- Chat starts empty -->
    </div>
  </div>

  <div id="input-container">
    <textarea id="prompt" placeholder="Type your question or topic..." rows="1"></textarea>
    <button id="send">Send</button>
    <button id="stop-btn">Stop</button>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const stopBtn = document.getElementById('stop-btn');
    const askBtn = document.getElementById('ask-btn');
    const researchBtn = document.getElementById('research-btn');

    let currentMode = 'ask';
    let abortController = null;

    askBtn.addEventListener('click', () => setMode('ask'));
    researchBtn.addEventListener('click', () => setMode('research'));

    function setMode(mode) {
      currentMode = mode;
      askBtn.classList.toggle('active', mode === 'ask');
      researchBtn.classList.toggle('active', mode === 'research');
    }

    promptInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuery();
      }
    });

    sendBtn.addEventListener('click', sendQuery);
    stopBtn.addEventListener('click', stopRequest);

    function showStopButton() {
      stopBtn.style.display = 'inline-block';
      sendBtn.style.display = 'none';
    }

    function hideStopButton() {
      stopBtn.style.display = 'none';
      sendBtn.style.display = 'inline-block';
      sendBtn.textContent = 'Send';
      sendBtn.disabled = false;
    }

    function stopRequest() {
      if (abortController) {
        abortController.abort();
        addMessage('Response stopped by user.', false);
      }
      hideStopButton();
      promptInput.disabled = false;
    }

    async function sendQuery() {
      const query = promptInput.value.trim();
      if (!query) return;

      addMessage(query, true);
      promptInput.value = '';
      promptInput.disabled = true;

      sendBtn.disabled = true;
      sendBtn.textContent = 'Loading...';
      showStopButton();

      abortController = new AbortController();

      try {
        const params = new URLSearchParams({
          topic: query,
          mode: currentMode
        });
        const url = `https://adamyakhairwal2011-vasuki-ai.hf.space/research?${params}`;

        const res = await fetch(url, { signal: abortController.signal });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        let text = await res.text();

        text = text
          .replace(/<!DOCTYPE html>[\s\S]*?<body[^>]*>/gi, '')
          .replace(/<\/body>[\s\S]*?<\/html>/gi, '')
          .replace(/<head>[\s\S]*?<\/head>/gi, '')
          .replace(/<script[\s\S]*?<\/script>/gi, '')
          .replace(/<style[\s\S]*?<\/style>/gi, '')
          .trim();

        if (text.includes('<div') || text.includes('<p') || text.includes('<h')) {
          const parser = new DOMParser();
          const doc = parser.parseFromString(text, 'text/html');
          text = doc.body?.innerHTML || text;
        }

        addMessage(text || '[No content returned]', false);

        // MathJax v3 render
        if (window.MathJax?.typesetPromise) {
          await MathJax.typesetPromise([messagesDiv.lastChild]);
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          addMessage(`Error: ${err.message}`, false);
          console.error(err);
        }
      } finally {
        abortController = null;
        hideStopButton();
        promptInput.disabled = false;
      }
    }

    function addMessage(content, isUser) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'ai'}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = isUser ? 'You' : 'AI';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = content;

      setTimeout(() => {
        Prism.highlightAllUnder(bubble);

        // Long code handling
        bubble.querySelectorAll('pre').forEach(pre => {
          pre.classList.add('line-numbers');
          if (pre.textContent.length > 1500) pre.classList.add('code-long');

          // Copy single block
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.textContent = 'Copy';
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(pre.textContent.trim());
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy', 2000);
          };
          pre.style.position = 'relative';
          pre.appendChild(copyBtn);
        });

        // Copy entire long response (for AI messages only)
        if (!isUser && bubble.textContent.length > 800) {
          const copyAll = document.createElement('button');
          copyAll.className = 'copy-all-btn';
          copyAll.textContent = 'Copy entire response';
          copyAll.onclick = () => {
            navigator.clipboard.writeText(bubble.textContent.trim());
            copyAll.textContent = 'Copied!';
            setTimeout(() => copyAll.textContent = 'Copy entire response', 2000);
          };
          bubble.appendChild(copyAll);
        }

        // MathJax re-render
        if (window.MathJax?.typesetPromise) {
          MathJax.typesetPromise([bubble]);
        }
      }, 150);

      msg.append(avatar, bubble);
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
