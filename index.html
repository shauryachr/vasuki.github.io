<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasuki Labs - Team Edition</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anta&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #ffca28; 
  --text: #333333;
  --bg-light: #e0e0e0;
  --glass-fill: rgba(255, 255, 255, 0.45);
  --glass-stroke: rgba(255, 255, 255, 0.6);
  --glass-dropdown: rgba(240, 240, 240, 0.9);
}

* { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

body {
  font-family: 'Google Sans', sans-serif;
  background: var(--bg-light);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* HEADER */
header {
  position: fixed;
  top: 15px;
  left: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 40px;
  z-index: 1000;
  background: var(--glass-fill);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid var(--glass-stroke);
  border-radius: 24px;
  animation: liquidFloat 6s ease-in-out infinite;
}

.logo {
  font-family: 'Anta', sans-serif;
  color: #b8860b;
  text-decoration: none;
  font-size: 20px;
  letter-spacing: 1px;
}

.nav-links { display: flex; gap: 10px; align-items: center; }

.nav-links a, .drop-trigger {
  font-family: 'Anta', sans-serif;
  color: rgba(0,0,0,0.6);
  text-decoration: none;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 12px;
  transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.nav-links a:hover, .dropdown:hover .drop-trigger {
  background: rgba(255, 255, 255, 0.3);
  color: #000;
}

/* TEAM DROPDOWN LOGIC */
.dropdown { position: relative; }

.dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--glass-dropdown);
  backdrop-filter: blur(15px);
  border: 1px solid var(--glass-stroke);
  border-radius: 18px;
  min-width: 180px;
  padding: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.dropdown:hover .dropdown-menu { display: block; }

.dropdown-menu a {
  display: block;
  width: 100%;
  padding: 10px 15px;
  text-align: center;
  color: #444;
  font-size: 13px;
  border-radius: 10px;
}

.dropdown-menu a:hover {
  background: var(--primary);
  color: #5d4037;
}

/* HERO SECTION */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(at 0% 0%, #f9f9f9 0, transparent 50%), 
              radial-gradient(at 100% 100%, #cfcfcf 0, transparent 50%);
}

.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  pointer-events: none;
}

.hero-content h1 {
  font-family: 'Anta', sans-serif;
  font-size: clamp(40px, 8vw, 80px);
  background: linear-gradient(135deg, #b8860b 0%, #ffca28 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.hero-content p {
  font-size: 18px;
  color: rgba(0,0,0,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* WAVES */
.hero__animation {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
  opacity: 0.6;
}

.hero__animation__wave {
  position: absolute;
  bottom: -5%;
  left: 0;
  width: 100%;
  height: 50%;
}

.hero__animation__wave--pink .wave-fill { fill: rgba(255, 202, 40, 0.2); filter: blur(4px); }
.hero__animation__wave--white .wave-fill { fill: rgba(255, 255, 255, 0.4); filter: blur(2px); }

@keyframes liquidFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

@keyframes waveRun {
  0% { transform: translateX(0); }
  100% { transform: translateX(-33.33%); }
}

.hero__animation__wave svg {
  width: 300%;
  height: 100%;
  animation: waveRun 25s linear infinite;
}
</style>
</head>
<body>

<header>
  <a href="General-AI.html" class="logo">VASUKI LABS</a>
  <div class="nav-links">
    <a href="General-AI.html">AI</a>
    <a href="Wiki-Knowledge.html">Wiki</a>
    
    <div class="dropdown">
      <span class="drop-trigger">Team</span>
      <div class="dropdown-menu">
        <a href="#">Shaurya Chauhan</a>
        <a href="#">Adamya Khairwal</a>
      </div>
    </div>

    <a href="https://vasuki.cloud/view-form.html?id=f-rktpe1" target="_blank">Review</a>
    <a href="https://vasuki.cloud/org.html?org=adbdb81c-1aad-404b-9fff-b01f1e44e516" target="_blank">About</a>
  </div>
</header>

<div class="hero">
  <div class="hero__animation">
    <div class="hero__animation__wave hero__animation__wave--pink">
      <svg viewBox="0 0 3600 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path class="wave-fill" d="M0,300 C150,200 350,400 600,300 C850,200 1050,400 1200,300 C1450,200 1650,400 1800,300 C2050,200 2250,400 2400,300 C2650,200 2850,400 3100,300 C3250,200 3450,400 3600,300 L3600,600 L0,600 Z"></path>
      </svg>
    </div>
    <div class="hero__animation__wave hero__animation__wave--white">
      <svg viewBox="0 0 4800 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path class="wave-fill" d="M0,350 C200,250 400,450 600,350 C800,250 1000,450 1200,350 C1400,250 1600,450 1800,350 C2000,250 2200,450 2400,350 C2600,250 2800,450 3000,350 C3200,250 3400,450 3600,350 C3800,250 4000,450 4200,350 C4400,250 4600,450 4800,350 L4800,600 L0,600 Z"></path>
      </svg>
    </div>
  </div>

  <div class="hero-content">
    <h1>Vasuki Labs</h1>
    <p>Build • Experiment • Create</p>
  </div>
</div>

<script>
(function(){
  const waves = [
    document.querySelector('.hero__animation__wave--pink'),
    document.querySelector('.hero__animation__wave--white')
  ];

  let targetX = 0.5, targetY = 0.5, currentX = 0.5, currentY = 0.5;

  window.addEventListener('mousemove', e => {
    targetX = e.clientX / window.innerWidth;
    targetY = e.clientY / window.innerHeight;
  });

  function animate() {
    currentX += (targetX - currentX) * 0.05;
    currentY += (targetY - currentY) * 0.05;

    waves.forEach((w, i) => {
      const offset = (currentX - 0.5) * -(400 + (i * 200));
      const scale = 0.1 + (1 - currentY) * (0.5 - (i * 0.1));
      w.style.marginLeft = offset + 'px';
      w.style.transform = `scaleY(${scale})`;
    });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>

</body>
</html>
