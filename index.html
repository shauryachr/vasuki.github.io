<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vasuki Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--border:#e0e3e7;
}

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0b0c10;
color:white;
overflow:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 40px;
z-index:10;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-weight:600;
font-size:18px;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:#ccc;
text-decoration:none;
font-size:14px;
}

.nav-links a:hover{
color:white;
}

/* HERO */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* FLOW CANVAS */

#flowCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* CONTENT */

.hero-content{
position:relative;
z-index:2;
text-align:center;
}

.hero h1{
font-size:72px;
font-weight:600;
letter-spacing:-1px;
background:linear-gradient(90deg,#fff,#8ab4f8,#c2e9fb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:0.7;
margin-top:10px;
font-size:16px;
}

/* INPUT */

.input-wrapper{
margin-top:30px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:30px;
padding:14px 22px;
backdrop-filter:blur(12px);
display:inline-block;
}

.input-wrapper input{
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
width:280px;
}

.input-wrapper input::placeholder{
color:#bbb;
}

</style>

</head>

<body>

<header>
<div class="logo">VASUKI LABS</div>

<div class="nav-links">
<a href="#">Wiki</a>
<a href="#">Tools</a>
<a href="#">About</a>
</div>
</header>

<div class="hero">

<canvas id="flowCanvas"></canvas>

<div class="hero-content">
<h1>Vasuki Labs</h1>
<p>Build. Experiment. Create.</p>

<div class="input-wrapper">
<input type="text" placeholder="Ask for code help...">
</div>

</div>

</div>

<script>

/* FLOWING ANIMATION */

const canvas = document.getElementById("flowCanvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize(){
w = canvas.width = window.innerWidth;
h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let t = 0;

function draw(){
ctx.clearRect(0,0,w,h);

/* MULTIPLE WAVES */

for(let i=0;i<4;i++){
ctx.beginPath();

for(let x=0;x<w;x++){
let y = Math.sin((x * 0.002) + t + i) * (40 + i*10) + h/2;
ctx.lineTo(x,y);
}

ctx.strokeStyle = `rgba(120,170,255,${0.12 - i*0.02})`;
ctx.lineWidth = 2;
ctx.stroke();
}

t += 0.01;
requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
