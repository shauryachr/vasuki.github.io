<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vasuki Assistant</title>

  <!-- MathJax v3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" async></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\( ', ' \)'], ['\\(', '\\)']],
        displayMath: [['\[ ', ' \]'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>

  <!-- Prism dark theme + line-numbers -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" />

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --border: #30363d;
      --accent-blue: #58a6ff;
      --accent-red: #f85149;
      --accent-green: #238636;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.9rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #mode-toggle button {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-left: 0.5rem;
      font-size: 0.9rem;
    }
    #mode-toggle button.active {
      background: var(--accent-blue);
      color: white;
      border: none;
    }
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #sidebar {
      width: 200px;
      background: #0d1117;
      border-right: 1px solid var(--border);
      padding: 1.2rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    #messages {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      max-width: 90%;
    }
    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: transparent;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user .avatar {
      background: var(--accent-green);
    }
    .bubble {
      padding: 1rem 1.3rem;
      border-radius: 6px;
      background: #161b22;
      border: 1px solid var(--border);
      line-height: 1.5;
      font-size: 1rem;
      word-break: break-word;
      min-height: 40px;
    }
    .user .bubble {
      background: var(--accent-blue);
      color: white;
      border: none;
    }
    pre {
      background: #0d1117;
      padding: 1.2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow-x: auto;
      margin: 1rem 0;
      max-height: 600px;
      overflow-y: auto;
      position: relative;
      color: #c9d1d9;
    }
    pre.code-long {
      max-height: 900px;
    }
    code {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.95rem;
    }
    .copy-all-btn {
      margin-top: 0.8rem;
      background: var(--accent-green);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #input-container {
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      position: relative;
    }
    #prompt {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
      resize: vertical;
      min-height: 50px;
      background: #0d1117;
      color: var(--text-primary);
    }
    #send {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 0 1.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    #stop-btn {
      background: var(--accent-red);
      color: white;
      border: none;
      padding: 0 1.4rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      display: none;
    }
    .copy-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: var(--accent-green);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    Vasuki Assistant
    <div id="mode-toggle">
      <button class="active" id="ask-btn">Ask</button>
      <button id="research-btn">Research</button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar">
      <strong>Mode</strong><br>
      <small>Ask → general / code / image</small><br>
      <small>Research → deep topic</small>
    </div>

    <div id="messages">
      <!-- Empty on start -->
    </div>
  </div>

  <div id="input-container">
    <textarea id="prompt" placeholder="Type your question or topic..." rows="1"></textarea>
    <button id="send">Send</button>
    <button id="stop-btn">Stop</button>
  </div>
