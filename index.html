<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vasuki Assistant</title>

  <!-- MathJax for LaTeX / mathematical expressions -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-AMS_HTML"></script>
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      tex2jax: {
        inlineMath: [ ['$','$'], ["\\(","\\)"] ],
        displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
        processEscapes: true,
        processEnvironments: true
      },
      "HTML-CSS": { linebreaks: { automatic: true } },
      SVG: { linebreaks: { automatic: true } }
    });
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

  <style>
    :root {
      --google-blue: #1a73e8;
      --google-red: #ea4335;
      --google-yellow: #fbbc04;
      --google-green: #34a853;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --text-tertiary: #70757a;
      --bg: #fff;
      --surface: #fff;
      --border: #dadce0;
      --hover: #f1f3f4;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.9rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 1.2rem;
      color: var(--google-blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #mode-toggle button {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-left: 0.5rem;
      font-size: 0.9rem;
    }
    #mode-toggle button.active {
      background: var(--google-blue);
      color: white;
      border: none;
    }
    #main {
      flex: 1;
      display: flex;
    }
    #sidebar {
      width: 200px;
      background: #f8f9fa;
      border-right: 1px solid var(--border);
      padding: 1.2rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    #messages {
      flex: 1;
      padding: 1.2rem;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 1.2rem;
      display: flex;
      gap: 0.9rem;
    }
    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--google-blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }
    .user .avatar { background: var(--google-green); }
    .bubble {
      padding: 0.9rem 1.1rem;
      border-radius: 4px;
      background: #f1f3f4;
      border: 1px solid var(--border);
      line-height: 1.45;
      font-size: 1rem;
    }
    .user .bubble {
      background: var(--google-blue);
      color: white;
      border: none;
    }
    pre {
      background: #f6f8fa;
      padding: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
      position: relative;
      margin: 0.6rem 0;
    }
    #input-container {
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.8rem;
      position: relative;
    }
    #prompt {
      flex: 1;
      padding: 0.8rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
      resize: vertical;
      min-height: 48px;
    }
    #send {
      background: var(--google-blue);
      color: white;
      border: none;
      padding: 0 1.4rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #stop-btn {
      background: var(--google-red);
      color: white;
      border: none;
      padding: 0 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      display: none;
    }
    .copy-btn {
      position: absolute;
      top: 0.4rem;
      right: 0.4rem;
      background: var(--google-green);
      color: white;
      border: none;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    /* Better spacing for math */
    .bubble mjx-container {
      margin: 0.4em 0;
    }
  </style>
</head>
<body>

  <header>
    Vasuki Assistant
    <div id="mode-toggle">
      <button class="active" id="ask-btn">Ask</button>
      <button id="research-btn">Research</button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar">
      <strong>Mode</strong><br>
      <small>Ask → general / code</small><br>
      <small>Research → deep topic</small>
    </div>

    <div id="messages">
      <!-- Chat starts completely empty -->
    </div>
  </div>

  <div id="input-container">
    <textarea id="prompt" placeholder="Type your question or topic..." rows="1"></textarea>
    <button id="send">Send</button>
    <button id="stop-btn">Stop</button>
  </div>

  // ... (keep the rest of your HTML the same, only replace the <script> part)

<script>
  // ... (keep all the previous variables and functions: messagesDiv, promptInput, sendBtn, etc.)

  async function sendQuery() {
    const query = promptInput.value.trim();
    if (!query) return;

    addMessage(query, true);
    promptInput.value = '';
    promptInput.disabled = true;

    sendBtn.disabled = true;
    sendBtn.textContent = 'Loading...';
    showStopButton();

    abortController = new AbortController();

    try {
      const params = new URLSearchParams({
        topic: query,
        mode: currentMode
      });
      const url = `https://adamyakhairwal2011-vasuki-ai.hf.space/research?${params}`;

      const res = await fetch(url, { signal: abortController.signal });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      let text = await res.text();

      // Aggressive cleanup of HTML + visible delimiters
      text = text
        .replace(/<!DOCTYPE html>[\s\S]*?<body[^>]*>/gi, '')
        .replace(/<\/body>[\s\S]*?<\/html>/gi, '')
        .replace(/<head>[\s\S]*?<\/head>/gi, '')
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<style[\s\S]*?<\/style>/gi, '')
        // Remove stray visible LaTeX brackets that weren't processed
        .replace(/\\\[|\\]|\\(|\\)|\$\$|\$|\[|\]/g, '')
        .trim();

      if (text.includes('<div') || text.includes('<p') || text.includes('<h')) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        text = doc.body?.innerHTML || text;
      }

      addMessage(text || '[No content returned]', false);

      // Force MathJax v3 re-render on new content
      if (window.MathJax && window.MathJax.typesetPromise) {
        await MathJax.typesetPromise([messagesDiv.lastChild]).catch(err => {
          console.error('MathJax render failed:', err);
        });
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        addMessage(`Error: ${err.message}`, false);
        console.error(err);
      }
    } finally {
      abortController = null;
      hideStopButton();
      promptInput.disabled = false;
    }
  }

  function addMessage(content, isUser) {
    const msg = document.createElement('div');
    msg.className = `message ${isUser ? 'user' : 'ai'}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = isUser ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = content;

    setTimeout(async () => {
      Prism.highlightAllUnder(bubble);

      bubble.querySelectorAll('pre, code').forEach(block => {
        const parent = block.tagName === 'PRE' ? block : block.parentElement;
        if (parent) {
          parent.style.position = 'relative';
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.textContent = 'Copy';
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(block.textContent.trim());
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy', 2000);
          };
          parent.appendChild(copyBtn);
        }
      });

      // Force MathJax re-render + delay for safety
      if (window.MathJax && window.MathJax.typesetPromise) {
        await MathJax.typesetPromise([bubble]).catch(err => console.error(err));
      }
    }, 150);

    msg.append(avatar, bubble);
    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // ... (keep the rest: setMode, showStopButton, hideStopButton, stopRequest)
</script>
</body>
</html>
