<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vasuki Coder - AI Code Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{
--primary:#1a73e8;
--text:#202124;
--background:#f1f3f4;
--surface:#ffffff;
--border:#e0e3e7;
}

body{
margin:0;
font-family:'Roboto',sans-serif;
background:linear-gradient(180deg,#f8f9fa,#eef2f5);
color:var(--text);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:#fff;
border-bottom:1px solid var(--border);
}

.nav-left{
display:flex;
align-items:center;
gap:30px;
}

.logo{
font-weight:600;
text-decoration:none;
color:#000;
}

.nav-links{
display:flex;
gap:20px;
align-items:center;
}

.nav-links a{
text-decoration:none;
color:#444;
font-size:14px;
}

/* DROPDOWN */

.dropdown{
position:relative;
cursor:pointer;
}

.dropdown-content{
display:none;
position:absolute;
top:28px;
background:white;
border:1px solid var(--border);
border-radius:8px;
padding:10px;
min-width:150px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.dropdown-content a{
display:block;
padding:6px;
font-size:13px;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* MAIN */

.container{
margin-top:120px;
text-align:center;
}

.greeting{
font-size:36px;
margin-bottom:30px;
}

/* INPUT */

.input-wrapper{
width:500px;
max-width:90%;
margin:auto;
background:#fff;
border-radius:30px;
padding:15px 20px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

.input-top{
display:flex;
align-items:center;
}

#query{
flex:1;
border:none;
outline:none;
font-size:16px;
}

/* CHIPS */

.chips-container{
margin-top:30px;
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.chip{
background:white;
border:1px solid var(--border);
padding:10px 15px;
border-radius:20px;
cursor:pointer;
font-size:13px;
transition:.2s;
}

.chip:hover{
background:#f0f4ff;
}

/* CHAT */

#chatArea{
max-width:800px;
margin:40px auto;
padding:10px;
}

.user-msg{
background:#e8f0fe;
padding:10px;
border-radius:12px;
margin:10px 0;
}

.bot-msg{
margin:10px 0;
}

</style>

</head>

<body>

<header>

<div class="nav-left">
<a class="logo" href="#">VASUKI LABS</a>

<div class="nav-links">
<a href="#">Wiki</a>
<a href="#">Speed</a>

<div class="dropdown">
<span>Tools ▾</span>
<div class="dropdown-content">
<a href="#">ASCII</a>
<a href="#">Base64</a>
<a href="#">Calculator</a>
</div>
</div>

<a href="#">Review</a>
<a href="#">About</a>
</div>
</div>

</header>

<div class="container">

<div class="greeting">
Hi Developer 👋 <br> Welcome to Vasuki Labs
</div>

<div class="input-wrapper">
<div class="input-top">
<input type="text" id="query" placeholder="Ask for code help...">
</div>
</div>

<div class="chips-container">

<div class="chip" onclick="handleQuickAction('React component')">React</div>
<div class="chip" onclick="handleQuickAction('Debug JS')">Debug</div>
<div class="chip" onclick="handleQuickAction('Optimize code')">Optimize</div>
<div class="chip" onclick="handleQuickAction('Python script')">Python</div>

</div>

</div>

<div id="chatArea"></div>

<script>
function handleQuickAction(text){
document.getElementById("query").value = text;
}
</script>

</body>
</html>
