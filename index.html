<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vasuki Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0b0c10;
color:white;
overflow:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:14px 40px;
z-index:10;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.logo{
font-weight:600;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:#ccc;
text-decoration:none;
}

.nav-links a:hover{
color:white;
}

/* HERO */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CANVAS */

#flowCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* CONTENT */

.hero{
position:relative;
height:100vh;
overflow:hidden;
background:#0b0c10;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* WAVE BASE */

.wave{
position:absolute;
bottom:0;
width:200%;
height:300px;
border-radius:40%;
filter:blur(60px);
opacity:0.5;
transition:transform 0.6s ease, margin-left 0.2s ease;
}

/* PINK WAVE */

.wave-pink{
background:radial-gradient(circle at 50% 50%, #ff4ecd, transparent 70%);
animation:waveMove 18s linear infinite;
}

/* BLUE WAVE */

.wave-blue{
background:radial-gradient(circle at 50% 50%, #4ecbff, transparent 70%);
animation:waveMove 25s linear infinite reverse;
opacity:0.4;
}

/* FLOATING ANIMATION */

@keyframes waveMove{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* CONTENT */

.hero-content{
position:relative;
z-index:2;
text-align:center;
}

.hero h1{
font-size:80px;
background:linear-gradient(90deg,#fff,#ff9ae6,#a1c4fd);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
</style>

</head>

<body>

<header>
<div class="logo">VASUKI LABS</div>

<div class="nav-links">
<a href="#">Wiki</a>
<a href="#">Tools</a>
<a href="#">About</a>
</div>
</header>

<div class="hero">

<canvas id="flowCanvas"></canvas>

<div class="hero">

<div class="wave wave-pink"></div>
<div class="wave wave-blue"></div>

<div class="hero-content">
<h1>Vasuki Labs</h1>
<p>Build. Experiment. Create.</p>
</div>

</div>
</div>

<script>

const waves = document.querySelectorAll('.wave');

window.addEventListener('mousemove', (e) => {

let x = e.clientX / window.innerWidth;
let y = e.clientY / window.innerHeight;

waves.forEach((wave, i) => {

/* horizontal movement like margin-left */
let moveX = (x - 0.5) * 200;

/* vertical squash/stretch */
let scaleY = 0.6 + (1 - y) * 0.8;

/* apply */
wave.style.marginLeft = moveX + 'px';
wave.style.transform = `scaleY(${scaleY})`;

});

});

</script><script>

</script>

</body>
</html>
