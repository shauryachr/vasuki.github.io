<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Review - Vasuki Coder</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#1a73e8;
--primary-hover:#1557b0;
--text:#202124;
--text-secondary:#5f6368;
--background:#ffffff;
--surface:#f8f9fa;
--border:#dadce0;
--success:#34a853;
--warning:#fbbc04;
--error:#ea4335;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Roboto,system-ui;
background:var(--background);
color:var(--text);
}

/* NAVBAR */

header{
background:var(--background);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1100px;
margin:auto;
padding:16px;
}

.logo{
color:var(--primary);
text-decoration:none;
font-weight:700;
font-size:24px;
}

.nav-links{display:flex;gap:18px;align-items:center}

.nav-links a{
text-decoration:none;
color:var(--text-secondary);
padding:8px 12px;
border-radius:8px;
}

.nav-links a:hover{
color:var(--primary);
background:rgba(26,115,232,0.08);
}

/* MAIN */

main{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* FORM */

.review-form{
border:1px solid var(--border);
border-radius:12px;
padding:24px;
margin-bottom:30px;
}

.form-group{margin-bottom:20px;}

input,textarea,select{
width:100%;
padding:12px;
border:1px solid var(--border);
border-radius:8px;
}

textarea{min-height:120px}

/* STARS */

.rating-container{
display:flex;
gap:6px;
margin-bottom:20px;
}

.star{
font-size:28px;
cursor:pointer;
color:#ccc;
}

.star.active{color:var(--warning);}

/* BUTTON */

.btn{
padding:12px 20px;
background:var(--primary);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* REVIEWS */

.review-item{
border:1px solid var(--border);
border-radius:10px;
padding:16px;
margin-bottom:12px;
}

</style>
</head>

<body>

<header>
<nav>
<a class="logo" href="index.html">VASUKI</a>

<div class="nav-links">
<a href="General-AI.html">AI</a>
<a href="Wiki-Knowledge.html">Wiki</a>
<a href="speedtest.html">Speed</a>
<a href="review.html">Review</a>
</div>

</nav>
</header>

<main>

<h1>Leave a Review</h1>

<div class="review-form">

<form id="reviewForm">

<div class="form-group">
<input type="text" id="name" placeholder="Name" required>
</div>

<div class="form-group">
<input type="email" id="email" placeholder="Email (optional)">
</div>

<div class="form-group">
<select id="category">
<option value="general">General</option>
<option value="ai-assistant">AI Assistant</option>
<option value="tools">Developer Tools</option>
<option value="ui">User Interface</option>
<option value="performance">Performance</option>
</select>
</div>

<div class="rating-container">
<span class="star" data="1">★</span>
<span class="star" data="2">★</span>
<span class="star" data="3">★</span>
<span class="star" data="4">★</span>
<span class="star" data="5">★</span>
</div>

<div class="form-group">
<textarea id="message" placeholder="Your review..." required></textarea>
</div>

<button class="btn">Submit</button>

</form>

</div>

<div id="reviews"></div>

</main>

<script>

const stars=document.querySelectorAll(".star")
let rating=0

stars.forEach(s=>{
s.onclick=()=>{
rating=s.getAttribute("data")
stars.forEach(st=>st.classList.remove("active"))
for(let i=0;i<rating;i++)stars[i].classList.add("active")
}
})

document.getElementById("reviewForm").onsubmit=e=>{
e.preventDefault()

if(rating==0){alert("Select rating");return}

const review={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
rating:rating,
category:document.getElementById("category").value,
message:document.getElementById("message").value
}

let data=JSON.parse(localStorage.getItem("reviews")||"[]")
data.unshift(review)
localStorage.setItem("reviews",JSON.stringify(data))

load()

// Send email via StaticForms API
sendReviewEmail(review)

e.target.reset()
rating=0
stars.forEach(s=>s.classList.remove("active"))
}

// Send review email via StaticForms API
function sendReviewEmail(review) {
const emailData = {
name: review.name,
email: review.email,
subject: `New Review from ${review.name} - Rating: ${review.rating}/5`,
message: `
New Review Submitted:

Name: ${review.name}
Email: ${review.email}
Rating: ${review.rating}/5
Category: ${review.category}

Review Message:
${review.message}

---
Submitted on: ${new Date().toLocaleString()}
`
};

fetch('https://api.staticforms.xyz/submit', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Accept': 'application/json'
},
body: JSON.stringify({
...emailData,
accessKey: 'sf_kb1n1nc33dnjl8a0h747i9ba',
emailTo: 'chauhanshaurya120@gmail.com',
replyTo: review.email
})
})
.then(response => response.json())
.then(data => {
console.log('Email sent successfully:', data);
})
.catch(error => {
console.error('Error sending email:', error);
});
}

function load(){
let data=JSON.parse(localStorage.getItem("reviews")||"[]")
const box=document.getElementById("reviews")
box.innerHTML=""

data.forEach(r=>{
box.innerHTML+=`
<div class="review-item">
<strong>${r.name}</strong><br>
${"★".repeat(r.rating)}<br>
${r.message}
</div>`
})
}

load()

</script>

</body>
</html>
