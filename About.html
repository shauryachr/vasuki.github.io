<!DOCTYPE html>
<html lang="en" style="--brand:#000000;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Google+Sans:wght@400;700&family=Tektur:wght@400..900&display=swap" rel="stylesheet">

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
    "https://aitckloahlwemlekaour.supabase.co",
    "YOUR_PUBLIC_ANON_KEY"
);

const orgId = new URLSearchParams(location.search).get("org");

async function init() {
    if (!orgId) { 
        document.body.innerHTML = "<div class='status-screen'><h1>404</h1><p>Identity not found.</p></div>"; 
        return; 
    }

    const { data, error } = await supabase
        .from("startups")
        .select("*")
        .eq("id", orgId)
        .single();

    if (error || !data) { 
        document.body.innerHTML = "<div class='status-screen'><h1>Private</h1><p>Node restricted.</p></div>"; 
        return; 
    }

    render(data);
}

function render(org) {
    const brand = org.theme_color || "#1a1a1a";
    document.documentElement.style.setProperty("--brand", brand);

    const parse = (v, fallback) => {
        try { return typeof v === "string" ? JSON.parse(v) : (v || fallback); } 
        catch { return fallback; }
    };

    const services = Array.isArray(org.services) ? org.services : [];
    const buttons = parse(org.buttons, []);
    const contacts = parse(org.contacts, {});
    const coverImg = org.cover_base64 || "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070";

    document.title = `${org.name} | ${org.tagline || "Designing the Future of Form."}`;

    document.body.innerHTML = `
<style>
:root {
    --brand: ${brand};
    --bg: #ffffff;
    --text: #050505;
    --text-dim: #666666;
    --border: #eeeeee;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Google Sans', sans-serif;
}

/* NAV */
header {
    display:flex; justify-content:space-between; align-items:center;
    padding:20px 5%; position:fixed; width:100%; top:0;
    background:rgba(255,255,255,0.85); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
}

.logo-area { display:flex; gap:12px; text-decoration:none; color:inherit; }
.logo-img { width:28px; height:28px; }
.logo-name { font-weight:800; font-size:15px; text-transform:uppercase; }

.nav-links { display:flex; gap:24px; }
.nav-btn { text-decoration:none; font-size:12px; color:var(--text-dim); }
.nav-btn:hover { color:var(--brand); }

/* HERO */
.hero-section {
    padding:160px 5% 80px;
    display:grid;
    grid-template-columns:1.2fr 1fr;
    gap:60px;
}

.hero-content h1 {
    font-size:clamp(40px,5vw,85px);
    font-weight:100;
}

.hero-content p {
    font-size:20px;
    color:var(--text-dim);
    border-left:3px solid var(--brand);
    padding-left:20px;
}

.hero-image-container { height:500px; }
.hero-image { width:100%; height:100%; object-fit:cover; }

/* GRID */
.content-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
}

.service-item {
    padding:60px;
    border:1px solid var(--border);
}

/* FOOTER */
footer {
    padding:100px 5%;
    background:#000;
    color:#fff;
    display:grid;
    grid-template-columns:1fr 1fr;
}

.cta-button {
    display:inline-block;
    margin-top:20px;
    padding:15px 40px;
    background:#fff;
    color:#000;
    text-decoration:none;
}
</style>

<header>
    <a href="#" class="logo-area">
        ${org.logo_base64 ? `<img src="${org.logo_base64}" class="logo-img">` : ""}
        <span class="logo-name">${org.name}</span>
    </a>

    <nav class="nav-links">
        ${buttons.map(btn => btn?.url && btn?.label 
            ? `<a href="${btn.url}" class="nav-btn" target="_blank">${btn.label}</a>` 
            : ""
        ).join("")}
    </nav>
</header>

<section class="hero-section">
    <div class="hero-content">
        <h1>${org.tagline || "Designing the Future of Form."}</h1>
        <div class="about-wrapper">
            ${org.about || "A Vasuki iTech specialized entity."}
        </div>
    </div>

    <div class="hero-image-container">
        <img src="${coverImg}" class="hero-image">
    </div>
</section>

<main class="content-grid">
    ${services.length > 0 
        ? services.map(s => `
            <div class="service-item">
                <h3>${s}</h3>
                <p style="color:var(--text-dim)">
                    Bespoke execution of ${s.toLowerCase()} frameworks.
                </p>
            </div>
        `).join("")
        : `<div class="service-item"><h3>Innovation</h3></div>`
    }
</main>

<footer>
    <div>
        <h2>Work with ${org.name}</h2>
        <a href="mailto:${contacts.email || "hello@company.com"}" class="cta-button">
            Start Inquiry
        </a>
    </div>

    <div style="text-align:right;">
        <p>${org.location || "Global Headquarters"}</p>
    </div>
</footer>
`;
}

init();
</script>
</head>

<body></body>
</html>
